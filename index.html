<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extra Celestial Observatory · stochastic dots</title>
    <link rel="icon" href="favicon.ico" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #00ffff;
            font-family: 'Arial', sans-serif;
            display: block;
            width: 100%;
            min-height: 100vh;
            padding: 20px 10px;
        }

        .eternal-universe-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: #000;
            color: white;
            padding: 20px 0;
            --electric-blue: #00ffff;
            --electric-pink: #ff00ff;
            --electric-purple: #9d00ff;
        }

        .eu-image-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 300px rgba(255, 0, 0, 1), 0 0 10px rgba(255, 255, 255, 1);
            margin: 0 auto;
            cursor: pointer;
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        #eu-graphCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: transparent;
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        .background-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 50%;
            opacity: 0.5;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
        }

        .title {
            font-size: 24px;
            line-height: 1.4;
            text-align: center;
            text-shadow: 0 0 12px #ff0000, 0 0 24px #ff8000;
            color: #ff8000;
            margin: 10px 0 5px;
        }

        .sound-toggle {
            color: #ff0000;
            cursor: pointer;
            text-decoration: none;
            font-size: 1rem;
            display: inline-block;
            text-shadow: 0 0 8px #ff0000;
        }

        .content-box {
            width: 100%;
            max-width: 600px;
            margin: 10px auto;
            padding: 15px 20px;
            background: #000;
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 10px;
            box-shadow: inset 0 0 10px red, 0 0 10px rgba(255, 255, 255, 1);
            color: #00ffff;
            text-align: center;
            font-size: 1rem;
        }

        .content-box a {
            color: #00ffff;
            text-decoration: none;
        }

        .content-box a:hover {
            text-decoration: underline;
        }

        .progress-bar {
            width: 100%;
            max-width: 600px;
            margin: 20px auto 10px;
            height: 4px;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #9d00ff, #ff00ff, #00ffff);
            filter: drop-shadow(0 0 8px #ffffff);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 12px 4px rgba(255, 0, 0, 0.9);
            pointer-events: none;
            transition: left 0.1s linear;
        }

        .bottom-paragraph {
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 8px #ff0000, 0 0 16px #ff0000;
        }
    </style>
</head>
<body>
    <div class="title">Extra Celestial Observatory</div>

    <div class="eternal-universe-wrapper">
        <div class="eu-image-container" id="visualizationClickArea">
            <img src="img.png" class="background-image" alt="War">
            <canvas id="eu-graphCanvas" width="600" height="600"></canvas>
        </div>
    </div>

    <div class="content-box">
        <a href="id.html">Who is this?</a>&nbsp;<a href="my.html">My story...</a>
    </div>

    <div class="content-box">
        <a href="m.html">Glagolitic Script Crash Course</a>
    </div>

    <div class="content-box">
        <span id="soundToggle" class="sound-toggle">Turn sounds on</span>
    </div>

    <div id="progressBar" class="progress-bar">
        <div id="progressDot" class="progress-dot"></div>
    </div>

    <p class="bottom-paragraph">The universe is a matrix. God is an equation.</p>

    <script>
        (function() {
            const centerX = 300;
            const centerY = 300;
            const canvas = document.getElementById('eu-graphCanvas');
            let points = [];
            let animationFrame;
            let activeDots = [];
            const DOT_GENERATION_INTERVAL = 500;
            let lastDotGeneration = 0;
            let lastSecond = -1;
            let lastMinute = -1;
            let lastHour = -1;
            let soundEnabled = false;
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            let audioElement = null;
            let isPlaying = false;
            let progressInterval = null;
            const progressBar = document.getElementById('progressBar');
            const progressDot = document.getElementById('progressDot');
            const soundToggle = document.getElementById('soundToggle');
            const visualizationArea = document.getElementById('visualizationClickArea');

            function playSound(filename) {
                if (!soundEnabled) return;
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                const audio = new Audio();
                audio.src = filename;
                audio.play().catch(() => {});
            }

            function generateBasePoints() {
                const newPoints = [];
                for (let i = 0; i <= 1000; i++) {
                    const theta = (i / 1000) * Math.PI * 2;
                    const x = -180 + (360 * theta / (Math.PI * 2));
                    const y = Math.sin(x) * x * Math.cos(x);
                    const radius = 50 + ((200) * (y + 180) / 360);
                    const graphX = centerX + Math.cos(theta - Math.PI / 2) * radius;
                    const graphY = centerY + Math.sin(theta - Math.PI / 2) * radius;
                    newPoints.push({ x: graphX, y: graphY });
                }
                return newPoints;
            }

            function drawBackground(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1;

                for (let angle = 0; angle < 360; angle += 15) {
                    const rad = angle * Math.PI / 180;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(
                        centerX + Math.cos(rad) * 275,
                        centerY + Math.sin(rad) * 275
                    );
                    ctx.stroke();
                }

                ctx.strokeStyle = '#ffffff';
                for (let r = 50; r <= 250; r += 50) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                points.forEach((p, idx) => {
                    if (idx === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.stroke();

                ctx.strokeStyle = 'rgba(0, 255, 255, 0.25)';
                ctx.lineWidth = 10;
                ctx.beginPath();
                points.forEach((p, idx) => {
                    if (idx === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.stroke();
            }

            function drawStaticDots(ctx) {
                points.forEach((point, i) => {
                    if (i % 10 === 0) {
                        const usePink = (Math.floor(i / 10) % 2 === 0);
                        let colorCenter = usePink ? '#ff00ff' : '#9d00ff';
                        const grad = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 14);
                        grad.addColorStop(0, colorCenter + '66');
                        grad.addColorStop(0.5, colorCenter + '40');
                        grad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 14, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = colorCenter + '66';
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = '#ffffff66';
                        ctx.beginPath();
                        ctx.arc(point.x - 1, point.y - 1, 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (i % 25 === 0) {
                        const extraColor = '#9d00ff';
                        const grad2 = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 12);
                        grad2.addColorStop(0, extraColor + '66');
                        grad2.addColorStop(0.6, extraColor + '40');
                        grad2.addColorStop(1, 'transparent');
                        ctx.fillStyle = grad2;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 12, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = extraColor + '66';
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 2.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }

            function generateRandomDots(now) {
                if (now - lastDotGeneration > DOT_GENERATION_INTERVAL) {
                    const count = Math.floor(Math.random() * 3) + 2;
                    for (let k = 0; k < count; k++) {
                        if (points.length === 0) continue;
                        const randIndex = Math.floor(Math.random() * points.length);
                        const p = points[randIndex];
                        const color = (Math.random() > 0.5) ? '#ff00ff' : '#9d00ff';
                        const lifetime = 100 + Math.random() * 9900;
                        activeDots.push({
                            point: p,
                            color: color,
                            birth: now,
                            lifetime: lifetime
                        });
                    }
                    lastDotGeneration = now;
                }

                if (activeDots.length > 200) {
                    activeDots = activeDots.slice(-180);
                }
            }

            function drawRandomDots(ctx, now) {
                activeDots = activeDots.filter(dot => {
                    const age = now - dot.birth;
                    return age < dot.lifetime;
                });

                activeDots.forEach(dot => {
                    const age = now - dot.birth;
                    const remaining = dot.lifetime - age;
                    let opacity = 1.0;
                    if (dot.lifetime > 0) {
                        opacity = remaining / dot.lifetime;
                    }
                    const alphaHex = Math.floor(opacity * 0.6 * 255).toString(16).padStart(2, '0');
                    const gradient = ctx.createRadialGradient(dot.point.x, dot.point.y, 0, dot.point.x, dot.point.y, 9);
                    gradient.addColorStop(0, dot.color + alphaHex);
                    gradient.addColorStop(0.7, dot.color + '00');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(dot.point.x, dot.point.y, 9, 0, 2 * Math.PI);
                    ctx.fill();

                    if (opacity > 0.3) {
                        ctx.fillStyle = dot.color + 'aa';
                        ctx.beginPath();
                        ctx.arc(dot.point.x, dot.point.y, 2.2, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                });
            }

            function drawClock(ctx) {
                if (isPlaying) return;

                const now = new Date();
                const hours = now.getHours() % 12;
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();

                if (soundEnabled) {
                    if (seconds !== lastSecond) {
                        playSound('s.wav');
                        lastSecond = seconds;
                    }
                    if (minutes !== lastMinute) {
                        playSound('m.wav');
                        lastMinute = minutes;
                    }
                    if (hours !== lastHour && minutes === 0 && seconds === 0) {
                        playSound('h.wav');
                        lastHour = hours;
                    }
                }

                const hourAngle = (hours * 30 + minutes * 0.5) * Math.PI / 180 - Math.PI / 2;
                const minuteAngle = (minutes * 6 + seconds * 0.1) * Math.PI / 180 - Math.PI / 2;
                const secondAngle = (seconds * 6) * Math.PI / 180 - Math.PI / 2;

                const hourLength = 180;
                const minuteLength = 240;
                const secondLength = 290;

                const hourX = centerX + Math.cos(hourAngle) * hourLength;
                const hourY = centerY + Math.sin(hourAngle) * hourLength;
                const minuteX = centerX + Math.cos(minuteAngle) * minuteLength;
                const minuteY = centerY + Math.sin(minuteAngle) * minuteLength;
                const secondX = centerX + Math.cos(secondAngle) * secondLength;
                const secondY = centerY + Math.sin(secondAngle) * secondLength;

                const hourGrad = ctx.createLinearGradient(centerX, centerY, hourX, hourY);
                hourGrad.addColorStop(0, '#ffffff');
                hourGrad.addColorStop(1, '#00ffff');
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 15;
                ctx.lineWidth = 6;
                ctx.strokeStyle = hourGrad;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(hourX, hourY);
                ctx.stroke();

                const minuteGrad = ctx.createLinearGradient(centerX, centerY, minuteX, minuteY);
                minuteGrad.addColorStop(0, '#ffffff');
                minuteGrad.addColorStop(1, '#ff00ff');
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 15;
                ctx.lineWidth = 4;
                ctx.strokeStyle = minuteGrad;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(minuteX, minuteY);
                ctx.stroke();

                const secondGrad = ctx.createLinearGradient(centerX, centerY, secondX, secondY);
                secondGrad.addColorStop(0, '#ffffff');
                secondGrad.addColorStop(1, '#9d00ff');
                ctx.shadowColor = '#9d00ff';
                ctx.shadowBlur = 15;
                ctx.lineWidth = 3;
                ctx.strokeStyle = secondGrad;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(secondX, secondY);
                ctx.stroke();

                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#00ffff';
                ctx.beginPath();
                ctx.arc(hourX, hourY, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = '#ff00ff';
                ctx.fillStyle = '#ff00ff';
                ctx.beginPath();
                ctx.arc(minuteX, minuteY, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = '#9d00ff';
                ctx.fillStyle = '#9d00ff';
                ctx.beginPath();
                ctx.arc(secondX, secondY, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
            }

            function animate() {
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const now = performance.now();

                generateRandomDots(now);
                drawBackground(ctx);
                drawStaticDots(ctx);
                drawRandomDots(ctx, now);
                drawClock(ctx);

                animationFrame = requestAnimationFrame(animate);
            }

            function updateProgress() {
                if (audioElement && isPlaying) {
                    const percent = (audioElement.currentTime / audioElement.duration) * 100;
                    progressDot.style.left = percent + '%';
                }
            }

            function stopClockSounds() {
                soundEnabled = false;
                soundToggle.textContent = 'Turn sounds on';
            }

            function playMusic() {
                if (audioElement) {
                    audioElement.pause();
                }
                audioElement = new Audio('skinhead.m4a');
                audioElement.addEventListener('timeupdate', updateProgress);
                audioElement.addEventListener('ended', () => {
                    isPlaying = false;
                    progressDot.style.left = '0%';
                    if (progressInterval) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                    }
                });
                audioElement.play();
                isPlaying = true;
                progressInterval = setInterval(updateProgress, 100);
                stopClockSounds();
            }

            function toggleMusic() {
                if (isPlaying) {
                    audioElement.pause();
                    isPlaying = false;
                    if (progressInterval) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                    }
                } else {
                    playMusic();
                }
            }

            visualizationArea.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMusic();
            });

            progressBar.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audioElement && isPlaying) {
                    const rect = progressBar.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const percent = clickX / rect.width;
                    audioElement.currentTime = percent * audioElement.duration;
                }
            });

            if (soundToggle) {
                soundToggle.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (isPlaying) {
                        toggleMusic();
                    }
                    soundEnabled = !soundEnabled;
                    this.textContent = soundEnabled ? 'Turn sounds off' : 'Turn sounds on';
                });
            }

            points = generateBasePoints();

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    animate();
                });
            } else {
                animate();
            }
        })();
    </script>
</body>
</html>
