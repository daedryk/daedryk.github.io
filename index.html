    <script>
        (function() {
            const centerX = 300;
            const centerY = 300;
            const canvas = document.getElementById('eu-graphCanvas');
            let points = [];
            let animationFrame;
            let lastSecond = -1;
            let lastMinute = -1;
            let lastHour = -1;
            let soundEnabled = false;
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            let audioElement = null;
            let isPlaying = false;
            let progressInterval = null;
            const progressBar = document.getElementById('progressBar');
            const progressDot = document.getElementById('progressDot');
            const visualizationArea = document.getElementById('visualizationClickArea');

            const ELECTRIC_RED = '#ff0000';
            const ELECTRIC_GREEN = '#00ff00';
            const ELECTRIC_BLUE = '#0000ff';

            function playSound(filename) {
                if (!soundEnabled) return;
                if (audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                const audio = new Audio();
                audio.src = filename;
                audio.play().catch(() => {});
            }

            function generateBasePoints() {
                const newPoints = [];
                for (let i = 0; i <= 1000; i++) {
                    const theta = (i / 1000) * Math.PI * 2;
                    const x = -180 + (360 * theta / (Math.PI * 2));
                    const y = Math.sin(x) * x * Math.cos(x);
                    const radius = 50 + ((200) * (y + 180) / 360);
                    const graphX = centerX + Math.cos(theta - Math.PI / 2) * radius;
                    const graphY = centerY + Math.sin(theta - Math.PI / 2) * radius;
                    newPoints.push({ x: graphX, y: graphY });
                }
                return newPoints;
            }

            function drawBackground(ctx) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#ff8000';
                ctx.lineWidth = 1;
                for (let angle = 0; angle < 360; angle += 15) {
                    const rad = angle * Math.PI / 180;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(
                        centerX + Math.cos(rad) * 275,
                        centerY + Math.sin(rad) * 275
                    );
                    ctx.strokeStyle = '#ff8000';
                    ctx.stroke();
                }
                ctx.strokeStyle = '#ff8000';
                for (let r = 50; r <= 250; r += 50) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.save();
                ctx.strokeStyle = ELECTRIC_GREEN;
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                points.forEach((p, idx) => {
                    if (idx === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.stroke();
                ctx.restore();
            }

            function drawStaticDots(ctx) {
                points.forEach((point, i) => {
                    if (i % 10 === 0) {
                        const useRed = (Math.floor(i / 10) % 2 === 0);
                        let coreColor = useRed ? ELECTRIC_RED : ELECTRIC_BLUE;
                        const grad = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 12);
                        grad.addColorStop(0, coreColor);
                        grad.addColorStop(0.7, coreColor);
                        grad.addColorStop(1, '#ffaa33');
                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 12, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = coreColor;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 3, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = '#ffdd99';
                        ctx.beginPath();
                        ctx.arc(point.x - 1, point.y - 1, 1.2, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (i % 25 === 0) {
                        const extraColor = ELECTRIC_BLUE;
                        const grad2 = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, 10);
                        grad2.addColorStop(0, extraColor);
                        grad2.addColorStop(0.8, extraColor);
                        grad2.addColorStop(1, '#ffaa55');
                        ctx.fillStyle = grad2;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 10, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.fillStyle = extraColor;
                        ctx.beginPath();
                        ctx.arc(point.x, point.y, 2.8, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
            }

            function drawSacredSymbol(ctx) {
                ctx.save();
                ctx.shadowBlur = 0;

                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 30 + i*12, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 128, 0, ${0.3 - i*0.1})`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                ctx.shadowColor = ELECTRIC_GREEN;
                ctx.shadowBlur = 25;
                ctx.font = 'bold 56px "KaiTi", "楷体", "STKaiti", "华文楷体", "Microsoft YaHei", serif';
                ctx.fillStyle = ELECTRIC_GREEN;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('道', centerX, centerY);

                ctx.shadowBlur = 12;
                ctx.fillStyle = '#ffaa55';
                for (let i = 0; i < 12; i++) {
                    const angle = (i * 30) * Math.PI / 180;
                    const rad = 95;
                    const x = centerX + Math.cos(angle) * rad;
                    const y = centerY + Math.sin(angle) * rad;
                    ctx.beginPath();
                    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff8000';
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            function animate() {
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                drawBackground(ctx);
                drawStaticDots(ctx);
                drawSacredSymbol(ctx);
                animationFrame = requestAnimationFrame(animate);
            }

            function updateProgress() {
                if (audioElement && isPlaying) {
                    const percent = (audioElement.currentTime / audioElement.duration) * 100;
                    progressDot.style.left = percent + '%';
                }
            }

            function stopAllSounds() {
                soundEnabled = false;
            }

            function playMusic() {
                if (audioElement) {
                    audioElement.pause();
                }
                audioElement = new Audio('skinhead.m4a');
                audioElement.addEventListener('timeupdate', updateProgress);
                audioElement.addEventListener('ended', () => {
                    isPlaying = false;
                    progressDot.style.left = '0%';
                    if (progressInterval) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                    }
                    canvas.classList.remove('canvas-hidden');
                });
                audioElement.play();
                isPlaying = true;
                progressInterval = setInterval(updateProgress, 100);
                stopAllSounds();
                canvas.classList.add('canvas-hidden');
            }

            function toggleMusic() {
                if (isPlaying) {
                    audioElement.pause();
                    isPlaying = false;
                    if (progressInterval) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                    }
                    canvas.classList.remove('canvas-hidden');
                } else {
                    playMusic();
                }
            }

            visualizationArea.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMusic();
            });

            progressBar.addEventListener('click', (e) => {
                e.stopPropagation();
                if (audioElement && isPlaying) {
                    const rect = progressBar.getBoundingClientRect();
                    const clickX = e.clientX - rect.left;
                    const percent = clickX / rect.width;
                    audioElement.currentTime = percent * audioElement.duration;
                }
            });

            points = generateBasePoints();

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => {
                    animate();
                });
            } else {
                animate();
            }
        })();
    </script>
</body>
</html>
