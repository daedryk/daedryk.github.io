<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Amstrad</title>
  <style>
    /* ========== RESET & BASE STYLES ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 12px;
      position: relative;
      background: #000;
    }

    /* ========== BACKGROUND PATTERN ========== */
    .pattern-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: repeating-linear-gradient(
        45deg,
        #00ffc3 0px,
        #00ffc3 4px,
        #ff00ff 4px,
        #ff00ff 8px,
        #ffff00 8px,
        #ffff00 12px
      );
      opacity: 0.15;
      pointer-events: none;
    }

    /* ========== MAIN FRAME & ANIMATIONS ========== */
    @keyframes dropFromTop {
      0% {
        transform: translateY(-100vh);
      }
      100% {
        transform: translateY(0);
      }
    }

    @keyframes moveStripeDown {
      0% {
        transform: translateY(-100%);
      }
      100% {
        transform: translateY(100vh);
      }
    }

    @keyframes moveStripeUp {
      0% {
        transform: translateY(100vh);
      }
      100% {
        transform: translateY(-100%);
      }
    }

    .cyber-frame {
      background: #030507;
      padding: 1.2rem 1.2rem 0.8rem 1.2rem;
      border: 2px solid #00ffc3;
      box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
      border-radius: 4px;
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      z-index: 1;
      backdrop-filter: blur(2px);
      overflow: hidden;
      animation: dropFromTop 0.8s ease-out;
    }

    .cyber-frame::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 200, 0.03) 0px,
        rgba(0, 0, 0, 0.5) 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 3;
      border-radius: 2px;
    }

    /* ========== STRIPE ANIMATIONS ========== */
    .stripe-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      border-radius: 2px;
    }

    .stripe {
      position: absolute;
      width: 100%;
      height: 6px;
      opacity: 0.8;
      box-shadow: 0 0 20px currentColor;
      animation: moveStripe linear forwards;
      z-index: 0;
    }

    /* ========== IMAGE & CAPTION ========== */
    .image-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      z-index: 2;
      border: 1px solid #00ffc3;
      box-shadow: 0 0 30px #00ffc355;
      background: #000;
      overflow: hidden;
    }

    .moon-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .caption {
      color: #ffff00;
      font-size: clamp(0.9rem, 4vw, 1.3rem);
      text-align: center;
      margin: 12px 0 8px 0;
      padding: 8px 0;
      border-top: 1px dashed #00ffc3;
      border-bottom: 1px dashed #00ffc3;
      text-shadow: 0 0 8px #ffaa00;
      word-break: break-word;
      font-weight: bold;
      background: #03050780;
      backdrop-filter: blur(2px);
      position: relative;
      z-index: 2;
      text-transform: uppercase;
    }

    /* ========== BUTTONS & FOOTER ========== */
    .home-button {
      display: inline-block;
      background: transparent;
      border: 2px solid #00ffc3;
      color: #00ffc3;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: bold;
      padding: 8px 24px;
      margin: 8px 0 4px 0;
      cursor: pointer;
      text-transform: uppercase;
      text-shadow: 0 0 8px #00ffc3;
      box-shadow: 0 0 15px #00ffc355, inset 0 0 10px #00ffc333;
      transition: all 0.2s ease;
      backdrop-filter: blur(3px);
      text-decoration: none;
      position: relative;
      z-index: 2;
    }

    .home-button:hover {
      background: #00ffc3;
      color: #030507;
      box-shadow: 0 0 30px #00ffc3;
    }

    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .signature {
      color: #00ffc3aa;
      font-size: 0.9rem;
      margin-left: 20px;
      font-weight: bold;
      text-shadow: 0 0 5px #00ffc3;
    }

    /* ========== FACT SHEET ========== */
    .fact-sheet {
      background: #030507;
      border: 2px solid #00ffc3;
      box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
      border-radius: 4px;
      padding: 1.5rem;
      margin: 2rem auto 0;
      max-width: 900px;
      color: #00ffc3;
      font-family: 'Courier New', monospace;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(2px);
    }

    .fact-sheet h2 {
      color: #ffff00;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
      border-bottom: 1px dashed #00ffc3;
      padding-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .fact-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem 2rem;
    }

    .fact-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dotted #00ffc366;
      padding: 0.3rem 0;
    }

    .fact-label {
      color: #ffff00;
      font-weight: bold;
    }

    .fact-value {
      color: #ffffff;
    }
  </style>
</head>

<body>
  <div class="pattern-bg"></div>

  <div class="cyber-frame">
    <div class="stripe-bg" id="stripeBg"></div>
    <div class="image-wrapper">
      <img class="moon-image" src="red_moon.jpg" alt="Red Moon in Supernova">
    </div>
    <div class="caption">RED MOON IN SUPERNOVA</div>
    <div class="footer">
      <a href="https://daedryk.github.io/" class="home-button">🏠 HOME</a>
      <span class="signature">CPC464</span>
    </div>
  </div>

  <div class="fact-sheet">
    <h2>✦ LUNAR DATA SHEET ✦</h2>
    <div class="fact-grid">
      <div class="fact-item">
        <span class="fact-label">MASS:</span>
        <span class="fact-value">7.346 × 10²² kg</span>
      </div>
      <div class="fact-item">
        <span class="fact-label">RADIUS:</span>
        <span class="fact-value">1,737.4 km</span>
      </div>
      <div class="fact-item">
        <span class="fact-label">SURFACE AREA:</span>
        <span class="fact-value">3.793 × 10⁷ km²</span>
      </div>
      <div class="fact-item">
        <span class="fact-label">GRAVITY:</span>
        <span class="fact-value">1.62 m/s²</span>
      </div>
      <div class="fact-item">
        <span class="fact-label">ORBIT PERIOD:</span>
        <span class="fact-value">27.3 days</span>
      </div>
      <div class="fact-item">
        <span class="fact-label">DISTANCE FROM EARTH:</span>
        <span class="fact-value">384,400 km</span>
      </div>
      <div class="fact-item">
        <span class="fact-label">TEMPERATURE:</span>
        <span class="fact-value">-173°C to 127°C</span>
      </div>
      <div class="fact-item">
        <span class="fact-label">ESCAPE VELOCITY:</span>
        <span class="fact-value">2.38 km/s</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const stripeBg = document.getElementById('stripeBg');
      const amstradColors = ['#00ffff', '#ff00ff', '#ffff00', '#ffffff', '#ff8800', '#ff4444', '#44ff44'];

      function createStripe() {
        const stripe = document.createElement('div');
        stripe.className = 'stripe';
        const color = amstradColors[Math.floor(Math.random() * amstradColors.length)];
        const direction = Math.random() > 0.5 ? 'Down' : 'Up';
        const duration = 0.6 + Math.random() * 0.8;
        const height = 2 + Math.floor(Math.random() * 10);
        const topPos = Math.random() * 100;

        stripe.style.background = color;
        stripe.style.color = color;
        stripe.style.boxShadow = `0 0 20px ${color}`;
        stripe.style.top = `${topPos}%`;
        stripe.style.animationDuration = `${duration}s`;
        stripe.style.height = `${height}px`;
        stripe.style.opacity = 0.4 + Math.random() * 0.6;
        stripe.style.animationName = `moveStripe${direction}`;
        stripe.addEventListener('animationend', () => {
          stripe.remove();
        });
        stripeBg.appendChild(stripe);
      }

      setInterval(createStripe, 60);

      for (let i = 0; i < 20; i++) {
        setTimeout(createStripe, i * 30);
      }
    })();
  </script>
</body>

</html>
