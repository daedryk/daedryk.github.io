<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>cyber weierstrass frame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
    </style>
</head>
<body>
    <div class="cyber-frame">
        <canvas id="weierCanvas" width="800" height="450"></canvas>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('weierCanvas');
            const ctx = canvas.getContext('2d');
            const container = document.querySelector('.cyber-frame');
            
            function resizeCanvas() {
                const containerWidth = container.clientWidth - 32;
                const aspect = 800/450;
                let newWidth = Math.min(800, containerWidth);
                let newHeight = newWidth / aspect;
                
                canvas.style.width = newWidth + 'px';
                canvas.style.height = newHeight + 'px';
            }
            
            const w = 800, h = 450;
            const xMin = -2.2, xMax = 1.2;
            const yMin = -1.6, yMax = 1.6;
            
            function toScreenX(x) {
                return ((x - xMin) / (xMax - xMin)) * w;
            }
            function toScreenY(y) {
                return h - ((y - yMin) / (yMax - yMin)) * h;
            }
            function weierstrass(x, nTerms = 22) {
                const a = 0.5;
                const b = 3.2;
                let sum = 0;
                for (let n = 0; n < nTerms; n++) {
                    const bn = Math.pow(b, n);
                    sum += Math.pow(a, n) * Math.cos(Math.PI * bn * x);
                }
                return sum;
            }
            function drawGrid() {
                ctx.save();
                ctx.strokeStyle = "#00ffc366";
                ctx.lineWidth = 1;
                for (let x = -2; x <= 1.5; x += 0.5) {
                    const sx = toScreenX(x);
                    ctx.beginPath();
                    ctx.moveTo(sx, 0);
                    ctx.lineTo(sx, h);
                    ctx.strokeStyle = "#00ffc322";
                    ctx.stroke();
                    ctx.fillStyle = "#00ffc3aa";
                    ctx.font = "10px 'Courier New', monospace";
                    ctx.fillText(x.toFixed(1), sx - 15, toScreenY(0) - 6);
                }
                for (let y = -1.5; y <= 1.5; y += 0.5) {
                    const sy = toScreenY(y);
                    ctx.beginPath();
                    ctx.moveTo(0, sy);
                    ctx.lineTo(w, sy);
                    ctx.strokeStyle = "#00ffc322";
                    ctx.stroke();
                    ctx.fillStyle = "#00ffc3aa";
                    ctx.fillText(y.toFixed(1), 8, sy - 4);
                }
                ctx.beginPath();
                ctx.strokeStyle = "#00ffc3";
                ctx.lineWidth = 1.5;
                const y0 = toScreenY(0);
                ctx.moveTo(0, y0);
                ctx.lineTo(w, y0);
                ctx.stroke();
                const x0 = toScreenX(0);
                ctx.moveTo(x0, 0);
                ctx.lineTo(x0, h);
                ctx.stroke();
                ctx.restore();
            }
            function drawWeierstrass() {
                ctx.clearRect(0, 0, w, h);
                drawGrid();
                ctx.beginPath();
                ctx.strokeStyle = "#ffb86b";
                ctx.lineWidth = 1.8;
                ctx.shadowColor = "#ffb86b";
                ctx.shadowBlur = 10;
                const steps = 4000;
                let first = true;
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const x = xMin + t * (xMax - xMin);
                    const y = weierstrass(x, 26);
                    if (y >= yMin - 0.3 && y <= yMax + 0.3) {
                        const sx = toScreenX(x);
                        const sy = toScreenY(y);
                        if (first) {
                            ctx.moveTo(sx, sy);
                            first = false;
                        } else {
                            ctx.lineTo(sx, sy);
                        }
                    } else {
                        first = true;  
                    }
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#00ffff";
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#00ffff";
                for (let i = 0; i <= 200; i+=4) {
                    const t = i / 200;
                    const x = xMin + t * (xMax - xMin);
                    const y = weierstrass(x, 20);
                    if (y >= yMin-0.3 && y <= yMax+0.3) {
                        ctx.beginPath();
                        ctx.arc(toScreenX(x), toScreenY(y), 1.2, 0, 2*Math.PI);
                        ctx.fillStyle = "#00ffc3";
                        ctx.fill();
                    }
                }
                ctx.shadowBlur = 0;
            }
            
            drawWeierstrass();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        })();
    </script>
</body>
</html>
