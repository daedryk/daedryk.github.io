<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Amstrad</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 12px;
            position: relative;
            background: #000;
        }
        
        .cyber-frame {
            background: #030507;
            padding: 1.2rem 1.2rem 0.8rem 1.2rem;
            border: 2px solid #00ffc3;
            box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
            border-radius: 4px;
            position: relative;
            width: 100%;
            max-width: 900px;
            z-index: 1;
            backdrop-filter: blur(2px);
            overflow: hidden;
        }
        
        .cyber-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 200, 0.03) 0px, rgba(0, 0, 0, 0.5) 1px, transparent 2px);
            pointer-events: none;
            z-index: 3;
            border-radius: 2px;
        }
        
        .stripe-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            border-radius: 2px;
        }
        
        .stripe {
            position: absolute;
            width: 100%;
            height: 6px;
            opacity: 0.8;
            box-shadow: 0 0 20px currentColor;
            animation: moveStripe linear forwards;
            z-index: 0;
        }
        
        @keyframes moveStripeDown {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        
        @keyframes moveStripeUp {
            0% { transform: translateY(100vh); }
            100% { transform: translateY(-100%); }
        }
        
        .image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            z-index: 2;
            border: 1px solid #00ffc3;
            box-shadow: 0 0 30px #00ffc355;
            background: #000;
            overflow: hidden;
        }
        
        .moon-image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .caption {
            color: #ffff00;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            letter-spacing: 3px;
            text-align: center;
            margin: 12px 0 8px 0;
            padding: 8px 0;
            border-top: 1px dashed #00ffc3;
            border-bottom: 1px dashed #00ffc3;
            text-shadow: 0 0 8px #ffaa00;
            word-break: break-word;
            font-weight: bold;
            background: #03050780;
            backdrop-filter: blur(2px);
            position: relative;
            z-index: 2;
            text-transform: uppercase;
        }
        
        .home-button {
            display: inline-block;
            background: transparent;
            border: 2px solid #00ffc3;
            color: #00ffc3;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 24px;
            margin: 8px 0 4px 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #00ffc3;
            box-shadow: 0 0 15px #00ffc355, inset 0 0 10px #00ffc333;
            transition: all 0.2s ease;
            backdrop-filter: blur(3px);
            text-decoration: none;
            position: relative;
            z-index: 2;
        }
        
        .home-button:hover {
            background: #00ffc3;
            color: #030507;
            box-shadow: 0 0 30px #00ffc3;
        }
        
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        
        .signature {
            color: #00ffc3aa;
            font-size: 0.9rem;
            margin-left: 20px;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 5px #00ffc3;
        }
    </style>
</head>
<body>
    <div class="cyber-frame">
        <div class="stripe-bg" id="stripeBg"></div>
        <div class="image-wrapper">
            <!-- Red moon image – high contrast, supernova mood -->
            <img 
                class="moon-image" 
                src="red_moon.jpg"
                alt="Red Moon in Supernova"
            >
        </div>
        <div class="caption">
            RED MOON IN SUPERNOVA
        </div>
        <div class="footer">
            <a href="https://daedryk.github.io/" class="home-button">🏠 HOME</a>
            <span class="signature">CPC464</span>
        </div>
    </div>
    
    <script>
        (function() {
            const stripeBg = document.getElementById('stripeBg');
            const amstradColors = ['#00ffff', '#ff00ff', '#ffff00', '#ffffff', '#ff8800', '#ff4444', '#44ff44'];
            
            function createStripe() {
                const stripe = document.createElement('div');
                stripe.className = 'stripe';
                
                const color = amstradColors[Math.floor(Math.random() * amstradColors.length)];
                const direction = Math.random() > 0.5 ? 'Down' : 'Up';
                const duration = 0.6 + Math.random() * 0.8;
                const height = 2 + Math.floor(Math.random() * 10);
                const topPos = Math.random() * 100;
                
                stripe.style.background = color;
                stripe.style.color = color;
                stripe.style.boxShadow = `0 0 20px ${color}`;
                stripe.style.top = `${topPos}%`;
                stripe.style.animationDuration = `${duration}s`;
                stripe.style.height = `${height}px`;
                stripe.style.opacity = 0.4 + Math.random() * 0.6;
                stripe.style.animationName = `moveStripe${direction}`;
                
                stripe.addEventListener('animationend', () => {
                    stripe.remove();
                });
                
                stripeBg.appendChild(stripe);
            }
            
            setInterval(createStripe, 60);
            
            for(let i = 0; i < 20; i++) {
                setTimeout(createStripe, i * 30);
            }
        })();
    </script>
</body>
</html>
