<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>cyber weierstrass · amstrad stripes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 12px;
            position: relative;
            background: #000;
        }
        
        .stripe-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        
        .stripe {
            position: absolute;
            width: 100%;
            height: 8px;
            background: #00ffff;
            opacity: 0.7;
            box-shadow: 0 0 10px #00ffff;
            animation: moveStripe 3s linear infinite;
        }
        
        @keyframes moveStripe {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100vh);
            }
        }
        
        .cyber-frame {
            background: #030507;
            padding: 1.2rem 1.2rem 0.8rem 1.2rem;
            border: 2px solid #00ffc3;
            box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
            border-radius: 4px;
            position: relative;
            width: 100%;
            max-width: 1000px;
            z-index: 1;
            backdrop-filter: blur(2px);
        }
        
        .cyber-frame::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 255, 200, 0.03) 0px, rgba(0, 0, 0, 0.5) 1px, transparent 2px);
            pointer-events: none;
            z-index: 2;
            border-radius: 2px;
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0000ff;
            border: 1px solid #00ffc3;
            box-shadow: 0 0 30px #00ffc355;
            image-rendering: crisp-edges;
        }
        
        .function-display {
            color: #ffff00;
            font-size: clamp(0.8rem, 4vw, 1.2rem);
            letter-spacing: 2px;
            text-align: center;
            margin: 12px 0 8px 0;
            padding: 8px 0;
            border-top: 1px dashed #00ffc3;
            border-bottom: 1px dashed #00ffc3;
            text-shadow: 0 0 8px #ffff00;
            word-break: break-word;
            font-weight: bold;
            background: #03050780;
            backdrop-filter: blur(2px);
        }
        
        .home-button {
            display: inline-block;
            background: transparent;
            border: 2px solid #00ffc3;
            color: #00ffc3;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 24px;
            margin: 8px 0 4px 0;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 8px #00ffc3;
            box-shadow: 0 0 15px #00ffc355, inset 0 0 10px #00ffc333;
            transition: all 0.2s ease;
            backdrop-filter: blur(3px);
            text-decoration: none;
        }
        
        .home-button:hover {
            background: #00ffc3;
            color: #030507;
            box-shadow: 0 0 30px #00ffc3;
        }
        
        .footer {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        
        .signature {
            color: #00ffc3aa;
            font-size: 0.7rem;
            margin-left: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="stripe-bg" id="stripeBg"></div>
    
    <div class="cyber-frame">
        <div class="canvas-wrapper">
            <canvas id="weierCanvas" width="800" height="450"></canvas>
        </div>
        <div class="function-display">
            f(x) = Σ aⁿ cos(π bⁿ x) &nbsp;&nbsp; a=0.5 &nbsp; b=3.2
        </div>
        <div class="footer">
            <a href="https://daedryk.github.io/" class="home-button">🏠 HOME</a>
            <span class="signature">⚡ STATIC ∞</span>
        </div>
    </div>
    
    <script>
        (function() {
            const canvas = document.getElementById('weierCanvas');
            const ctx = canvas.getContext('2d');
            
            const w = 800, h = 450;
            const xMin = -2.2, xMax = 1.2;
            const yMin = -1.6, yMax = 1.6;
            
            function toScreenX(x) {
                return ((x - xMin) / (xMax - xMin)) * w;
            }
            function toScreenY(y) {
                return h - ((y - yMin) / (yMax - yMin)) * h;
            }
            
            function weierstrass(x, nTerms = 26) {
                const a = 0.5;
                const b = 3.2;
                let sum = 0;
                for (let n = 0; n < nTerms; n++) {
                    const bn = Math.pow(b, n);
                    sum += Math.pow(a, n) * Math.cos(Math.PI * bn * x);
                }
                return sum;
            }
            
            function drawWeierstrass() {
                ctx.clearRect(0, 0, w, h);
                
                ctx.beginPath();
                ctx.strokeStyle = "#ffff00";
                ctx.lineWidth = 2.2;
                ctx.shadowColor = "#ffff00";
                ctx.shadowBlur = 14;
                
                const steps = 5000;
                let first = true;
                
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const x = xMin + t * (xMax - xMin);
                    const y = weierstrass(x, 26);
                    
                    if (y >= yMin - 0.3 && y <= yMax + 0.3) {
                        const sx = toScreenX(x);
                        const sy = toScreenY(y);
                        
                        if (first) {
                            ctx.beginPath();
                            ctx.moveTo(sx, sy);
                            first = false;
                        } else {
                            ctx.lineTo(sx, sy);
                        }
                    } else {
                        if (!first) {
                            ctx.stroke();
                            first = true;
                        }
                    }
                }
                if (!first) {
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 0;
            }
            
            drawWeierstrass();
            
            const stripeBg = document.getElementById('stripeBg');
            const amstradColors = ['#00ffff', '#ff00ff', '#ffff00', '#ffffff', '#ff8800'];
            
            function createStripes() {
                stripeBg.innerHTML = '';
                const stripeCount = 15;
                
                for (let i = 0; i < stripeCount; i++) {
                    const stripe = document.createElement('div');
                    stripe.className = 'stripe';
                    
                    const color = amstradColors[Math.floor(Math.random() * amstradColors.length)];
                    const top = Math.random() * 100;
                    const delay = Math.random() * 5;
                    const duration = 2 + Math.random() * 4;
                    const height = 4 + Math.floor(Math.random() * 8);
                    
                    stripe.style.background = color;
                    stripe.style.boxShadow = `0 0 15px ${color}`;
                    stripe.style.top = `${top}%`;
                    stripe.style.animationDelay = `${delay}s`;
                    stripe.style.animationDuration = `${duration}s`;
                    stripe.style.height = `${height}px`;
                    stripe.style.opacity = 0.3 + Math.random() * 0.5;
                    
                    stripeBg.appendChild(stripe);
                }
            }
            
            createStripes();
            setInterval(createStripes, 8000);
        })();
    </script>
</body>
</html>
