<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Amstrad — lunar SVG moved</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 12px;
      position: relative;
      background: #000;
    }

    .pattern-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: repeating-linear-gradient(
        45deg,
        #00ffc3 0px,
        #00ffc3 4px,
        #ff00ff 4px,
        #ff00ff 8px,
        #ffff00 8px,
        #ffff00 12px
      );
      opacity: 0.5;
      pointer-events: none;
    }

    @keyframes dropFromTop {
      0% {
        transform: translateY(-100vh);
      }
      100% {
        transform: translateY(0);
      }
    }

    @keyframes moveStripeDown {
      0% {
        transform: translateY(-100%);
      }
      100% {
        transform: translateY(100vh);
      }
    }

    @keyframes moveStripeUp {
      0% {
        transform: translateY(100vh);
      }
      100% {
        transform: translateY(-100%);
      }
    }

    .cyber-frame {
      background: #030507;
      padding: 1.2rem 1.2rem 0.8rem 1.2rem;
      border: 2px solid #00ffc3;
      box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
      border-radius: 4px;
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      z-index: 1;
      overflow: hidden;
      animation: dropFromTop 0.8s ease-out;
    }

    .cyber-frame::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      pointer-events: none;
      z-index: 3;
      border-radius: 2px;
    }

    .stripe-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      border-radius: 2px;
    }

    .stripe {
      position: absolute;
      width: 100%;
      height: 6px;
      opacity: 0.8;
      box-shadow: 0 0 20px currentColor;
      animation: moveStripe linear forwards;
      z-index: 0;
    }

    .image-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      z-index: 2;
      border: 1px solid #00ffc3;
      box-shadow: 0 0 30px #00ffc355;
      background: #000;
      overflow: hidden;
    }

    .moon-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .caption {
      color: #ffff00;
      font-size: clamp(0.9rem, 4vw, 1.3rem);
      text-align: center;
      margin: 12px 0 8px 0;
      padding: 8px 0;
      border-top: 1px dashed #00ffc3;
      border-bottom: 1px dashed #00ffc3;
      text-shadow: 0 0 8px #ffaa00;
      word-break: break-word;
      font-weight: bold;
      background: #03050780;
      position: relative;
      z-index: 2;
      text-transform: uppercase;
    }

    .home-button {
      display: inline-block;
      background: transparent;
      border: 2px solid #00ffc3;
      color: #00ffc3;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      font-weight: bold;
      padding: 8px 24px;
      margin: 8px 0 4px 0;
      cursor: pointer;
      text-transform: uppercase;
      text-shadow: 0 0 8px #00ffc3;
      box-shadow: 0 0 15px #00ffc355, inset 0 0 10px #00ffc333;
      transition: all 0.2s ease;
      text-decoration: none;
      position: relative;
      z-index: 2;
    }

    .home-button:hover {
      background: #00ffc3;
      color: #030507;
      box-shadow: 0 0 30px #00ffc3;
    }

    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .signature {
      color: #00ffc3aa;
      font-size: 0.9rem;
      margin-left: 20px;
      font-weight: bold;
      text-shadow: 0 0 5px #00ffc3;
    }

    .fact-sheet {
      background: #030507;
      border: 2px solid #00ffc3;
      box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
      border-radius: 4px;
      padding: 1.5rem 0.5rem 1rem 0.5rem;
      margin: 2rem auto 0;
      max-width: 900px;
      color: #00ffc3;
      font-family: 'Courier New', monospace;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .fact-sheet h2 {
      color: #ffff00;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
      border-bottom: 1px dashed #00ffc3;
      padding-bottom: 0.5rem;
      text-transform: uppercase;
      width: 100%;
    }

    .svg-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.5rem 0 0.2rem;
    }

    svg {
      max-width: 280px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 8px #00ffc3aa);
    }

    @media (max-width: 400px) {
      .fact-sheet {
        padding: 1rem 0.2rem;
      }
    }
  </style>
</head>

<body>
  <div class="pattern-bg"></div>

  <div class="cyber-frame">
    <div class="stripe-bg" id="stripeBg"></div>
    <div class="image-wrapper">
      <img class="moon-image" src="red_moon.jpg" alt="Red Moon in Supernova">
    </div>
    <div class="caption">RED MOON IN SUPERNOVA</div>
    <div class="footer">
      <a href="https://daedryk.github.io/" class="home-button">🏠 HOME</a>
      <span class="signature">CPC464</span>
    </div>
  </div>

  <div class="fact-sheet">
    <h2>✦ MADE IN SLOVENIA ✦</h2>
    <div class="svg-container">
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-40 -102.2 80 102.2" fill="#00f">
        <path d="M-37.175342-94.368205a92.195445 92.195445 0 0 1 74.350684 0Q43-12 0-1q-43-11-37.175342-93.368205z"/>
        <path id="a" d="m0-84.5 1.125 2.551443L3.897114-82.25 2.25-80l1.647114 2.25L1.125-78.051443 0-75.5l-1.125-2.551443-2.772114.301443L-2.25-80l-1.647114-2.25 2.772114.301443" fill="#ff0"/>
        <use xlink:href="#a" x="-10.5" y="-14"/>
        <use xlink:href="#a" x="10.5" y="-14"/>
        <path d="m0-70 9 18 6-8 15 20a10 10 0 0 1-.384761 2.747211A46.400549 46.400549 0 0 1 0-6.090878A46.400549 46.400549 0 0 1-29.615239-37.252789 10 10 0 0 1-30-40l15-20 6 8z" fill="#fff"/>
        <path id="b" d="M-29.615239-37.252789A10 10 0 0 0-15-31.339746a10 10 0 0 1 10 0 10 10 0 0 0 10 0 10 10 0 0 1 10 0A10 10 0 0 0 29.615239-37.252789L30-37.113249v7.320508a10 10 0 0 0-5 1.339746 10 10 0 0 1-10 0 10 10 0 0 0-10 0 10 10 0 0 1-10 0 10 10 0 0 0-10 0 10 10 0 0 1-10 0 10 10 0 0 0-5-1.339746v-7.320508"/> 
        <use xlink:href="#b" y="5.773503"/>
        <path d="M-40-93.066239a92.195445 92.195445 0 0 1 2.824658-1.301966l2.97064 47.448778A49.301041 49.301041 0 0 0 0-3.036262a49.301041 49.301041 0 0 0 34.204702-43.883164l2.97064-47.448778A92.195445 92.195445 0 0 1 40-93.066239L37.099526-46.73819A52.201533 52.201533 0 0 1 0 0a52.201533 52.201533 0 0 1-37.099526-46.738189z" fill="red"/>
      </svg>
    </div>
  </div>

  <script>
    (function() {
      const stripeBg = document.getElementById('stripeBg');
      const amstradColors = ['#00ffff', '#ff00ff', '#ffff00', '#ffffff', '#ff8800', '#ff4444', '#44ff44'];

      function createStripe() {
        const stripe = document.createElement('div');
        stripe.className = 'stripe';
        const color = amstradColors[Math.floor(Math.random() * amstradColors.length)];
        const direction = Math.random() > 0.5 ? 'Down' : 'Up';
        const duration = 0.6 + Math.random() * 0.8;
        const height = 2 + Math.floor(Math.random() * 10);
        const topPos = Math.random() * 100;

        stripe.style.background = color;
        stripe.style.color = color;
        stripe.style.boxShadow = `0 0 20px ${color}`;
        stripe.style.top = `${topPos}%`;
        stripe.style.animationDuration = `${duration}s`;
        stripe.style.height = `${height}px`;
        stripe.style.opacity = 0.4 + Math.random() * 0.6;
        stripe.style.animationName = `moveStripe${direction}`;
        stripe.addEventListener('animationend', () => {
          stripe.remove();
        });
        stripeBg.appendChild(stripe);
      }

      setInterval(createStripe, 60);

      for (let i = 0; i < 20; i++) {
        setTimeout(createStripe, i * 30);
      }
    })();
  </script>
</body>

</html>
