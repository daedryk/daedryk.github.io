<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Amstrad CPC464 · Panther player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 12px;
      position: relative;
      background: #000;
    }

    .pattern-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: repeating-linear-gradient(
        45deg,
        #00ffc3 0px,
        #00ffc3 4px,
        #ff00ff 4px,
        #ff00ff 8px,
        #ffff00 8px,
        #ffff00 12px
      );
      opacity: 0.5;
      pointer-events: none;
    }

    @keyframes dropFromTop {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(0); }
    }

    @keyframes moveStripeDown {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes moveStripeUp {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-100%); }
    }

    .cyber-frame {
      background: #030507;
      padding: 1.2rem 1.2rem 1.2rem 1.2rem;
      border: 2px solid #00ffc3;
      box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
      border-radius: 4px;
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      z-index: 1;
      overflow: hidden;
      animation: dropFromTop 0.8s ease-out;
    }

    .cyber-frame::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      pointer-events: none;
      z-index: 3;
      border-radius: 2px;
    }

    .stripe-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
      border-radius: 2px;
    }

    .stripe {
      position: absolute;
      width: 100%;
      height: 6px;
      opacity: 0.8;
      box-shadow: 0 0 20px currentColor;
      animation: moveStripe linear forwards;
      z-index: 0;
    }

    .image-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      z-index: 2;
      border: 1px solid #00ffc3;
      box-shadow: 0 0 30px #00ffc355;
      background: #000;
      overflow: hidden;
    }

    .moon-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .music-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 25;
    }
    .music-overlay svg {
      display: block;
      width: 86%;
      max-width: 420px;
      height: auto;
      pointer-events: auto;
      filter: drop-shadow(0 0 8px #910000);
    }

    .fact-sheet {
      background: transparent;
      border: 2px solid #00ffc3;
      box-shadow: 0 0 20px #00ffc366, inset 0 0 15px #00ffc333;
      border-radius: 4px;
      padding: 1.5rem 0.5rem 1rem 0.5rem;
      margin: 2rem auto 0;
      max-width: 900px;
      color: #00ffc3;
      font-family: 'Courier New', monospace;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .fact-sheet h2 {
      color: #ffff00;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 1rem;
      border-bottom: 1px dashed #00ffc3;
      padding-bottom: 0.5rem;
      text-transform: uppercase;
      width: 100%;
    }

    .svg-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.5rem 0 0.2rem;
    }

    .fact-sheet a {
      display: inline-block;
      line-height: 0;
    }

    .fact-sheet svg {
      max-width: 280px;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 8px #00ffc3aa);
      cursor: pointer;
      transition: filter 0.2s;
    }
    .fact-sheet svg:hover {
      filter: drop-shadow(0 0 12px #00ffc3) brightness(1.2);
    }

    @media (max-width: 400px) {
      .fact-sheet { padding: 1rem 0.2rem; }
    }
  </style>
</head>
<body>
  <div class="pattern-bg"></div>

  <div class="cyber-frame">
    <div class="stripe-bg" id="stripeBg"></div>
    <div class="image-wrapper">
      <img class="moon-image" src="red_moon.jpg" alt="Red Moon in Supernova">

      <div class="music-overlay">
        <svg viewBox="0 0 380 140" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <style>
              .panther-btn { fill: #910000; cursor: pointer; transition: opacity 0.1s; }
              .panther-btn:hover { opacity: 0.85; }
              .panther-progress-bg { fill: #3d0000; stroke: #910000; stroke-width: 2; }
              .panther-progress-fill { fill: #910000; }
              .panther-artist { fill: #ffb5b5; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
              .panther-track { fill: #ffd1d1; font-family: 'Courier New', monospace; font-size: 14px; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
              .transparent-bg { fill: transparent; stroke: #910000; stroke-width: 2; }
            </style>
          </defs>

          <rect x="10" y="10" width="360" height="120" rx="16" ry="16" fill="transparent" stroke="#910000" stroke-width="2" />

          <text x="190" y="35" class="panther-artist" style="fill:#ffb5b5; paint-order: stroke; stroke: #330000; stroke-width: 2px;" id="artistDisplay">PANTHER</text>
          <text x="190" y="55" class="panther-track" style="fill:#ffd1d1; paint-order: stroke; stroke: #330000; stroke-width: 1.5px;" id="trackDisplay">dmi</text>

          <g id="btnPrev" class="panther-btn" onclick="window.playerControls.prev()">
            <circle cx="95" cy="85" r="20" fill="#910000" stroke="#ffb5b5" stroke-width="1.5" />
            <polygon points="89,85 101,75 101,95" fill="black" />
          </g>

          <g id="btnPlayPause" class="panther-btn" onclick="window.playerControls.togglePlayPause()">
            <circle cx="190" cy="85" r="24" fill="#910000" stroke="#ffb5b5" stroke-width="2" />
            <polygon id="playIcon" points="183,74 203,85 183,96" fill="black" display="block" />
            <g id="pauseIcon" display="none">
              <rect x="180" y="74" width="6" height="22" fill="black" />
              <rect x="194" y="74" width="6" height="22" fill="black" />
            </g>
          </g>

          <g id="btnNext" class="panther-btn" onclick="window.playerControls.next()">
            <circle cx="285" cy="85" r="20" fill="#910000" stroke="#ffb5b5" stroke-width="1.5" />
            <polygon points="291,85 279,75 279,95" fill="black" />
          </g>

          <rect x="70" y="115" width="240" height="10" rx="5" ry="5" fill="#3d0000" stroke="#910000" stroke-width="2" />
          <rect id="progressFill" x="70" y="115" width="0" height="10" rx="5" ry="5" fill="#910000" />
        </svg>
      </div>
    </div>
  </div>

  <div class="fact-sheet">
    <h2>✦ MADE IN SLOVENIA ✦</h2>
    <div class="svg-container">
      <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="-40 -102.2 80 102.2" fill="#00f">
        <path d="M-37.175342-94.368205a92.195445 92.195445 0 0 1 74.350684 0Q43-12 0-1q-43-11-37.175342-93.368205z"/>
        <path id="a" d="m0-84.5 1.125 2.551443L3.897114-82.25 2.25-80l1.647114 2.25L1.125-78.051443 0-75.5l-1.125-2.551443-2.772114.301443L-2.25-80l-1.647114-2.25 2.772114.301443" fill="#ff0"/>
        <use xlink:href="#a" x="-10.5" y="-14"/>
        <use xlink:href="#a" x="10.5" y="-14"/>
        <path d="m0-70 9 18 6-8 15 20a10 10 0 0 1-.384761 2.747211A46.400549 46.400549 0 0 1 0-6.090878A46.400549 46.400549 0 0 1-29.615239-37.252789 10 10 0 0 1-30-40l15-20 6 8z" fill="#fff"/>
        <path id="b" d="M-29.615239-37.252789A10 10 0 0 0-15-31.339746a10 10 0 0 1 10 0 10 10 0 0 0 10 0 10 10 0 0 1 10 0A10 10 0 0 0 29.615239-37.252789L30-37.113249v7.320508a10 10 0 0 0-5 1.339746 10 10 0 0 1-10 0 10 10 0 0 0-10 0 10 10 0 0 1-10 0 10 10 0 0 0-10 0 10 10 0 0 1-10 0 10 10 0 0 0-5-1.339746v-7.320508"/> 
        <use xlink:href="#b" y="5.773503"/>
        <path d="M-40-93.066239a92.195445 92.195445 0 0 1 2.824658-1.301966l2.97064 47.448778A49.301041 49.301041 0 0 0 0-3.036262a49.301041 49.301041 0 0 0 34.204702-43.883164l2.97064-47.448778A92.195445 92.195445 0 0 1 40-93.066239L37.099526-46.73819A52.201533 52.201533 0 0 1 0 0a52.201533 52.201533 0 0 1-37.099526-46.738189z" fill="red"/>
      </svg>
    </div>
    <p><a href="https://daedryk.github.io/">Start again</a></p>
  </div>

  <script>
    (function() {
      const stripeBg = document.getElementById('stripeBg');
      const amstradColors = ['#00ffff', '#ff00ff', '#ffff00', '#ffffff', '#ff8800', '#ff4444', '#44ff44'];

      function createStripe() {
        const stripe = document.createElement('div');
        stripe.className = 'stripe';
        const color = amstradColors[Math.floor(Math.random() * amstradColors.length)];
        const direction = Math.random() > 0.5 ? 'Down' : 'Up';
        const duration = 0.6 + Math.random() * 0.8;
        const height = 2 + Math.floor(Math.random() * 10);
        const topPos = Math.random() * 100;

        stripe.style.background = color;
        stripe.style.color = color;
        stripe.style.boxShadow = `0 0 20px ${color}`;
        stripe.style.top = `${topPos}%`;
        stripe.style.animationDuration = `${duration}s`;
        stripe.style.height = `${height}px`;
        stripe.style.opacity = 0.4 + Math.random() * 0.6;
        stripe.style.animationName = `moveStripe${direction}`;
        stripe.addEventListener('animationend', () => { stripe.remove(); });
        stripeBg.appendChild(stripe);
      }
      setInterval(createStripe, 60);
      for (let i = 0; i < 20; i++) setTimeout(createStripe, i * 30);
    })();

    (function() {
      const trackList = [
        { file: '1.Panther.dmi.m4a', artist: 'PANTHER', title: 'dmi' },
        { file: '2.Panther.bmx.m4a', artist: 'PANTHER', title: 'bmx' },
        { file: '3.Panther.eco.m4a', artist: 'PANTHER', title: 'eco' }
      ];
      
      const audio = new Audio();
      audio.preload = 'metadata';
      
      let currentTrackIndex = 0;
      let isPlaying = false;
      
      const artistDisplay = document.getElementById('artistDisplay');
      const trackDisplay = document.getElementById('trackDisplay');
      const playIcon = document.getElementById('playIcon');
      const pauseIcon = document.getElementById('pauseIcon');
      const progressFill = document.getElementById('progressFill');
      
      function setAudioSource(index) {
        audio.src = trackList[index].file;
        audio.load();
      }
      
      function updateTrackInfo() {
        if (artistDisplay) artistDisplay.textContent = trackList[currentTrackIndex].artist;
        if (trackDisplay) trackDisplay.textContent = trackList[currentTrackIndex].title;
      }
      
      function resetToFirstTrack() {
        audio.pause();
        audio.currentTime = 0;
        currentTrackIndex = 0;
        setAudioSource(0);
        updateTrackInfo();
        if (progressFill) progressFill.setAttribute('width', 0);
        isPlaying = false;
        updatePlayPauseIcons();
      }
      
      function playCurrentTrack() {
        audio.play().catch(e => {
          console.log('Playback error:', e);
          isPlaying = false;
          updatePlayPauseIcons();
        });
      }
      
      function updatePlayPauseIcons() {
        if (!playIcon || !pauseIcon) return;
        if (isPlaying) {
          playIcon.setAttribute('display', 'none');
          pauseIcon.setAttribute('display', 'block');
        } else {
          playIcon.setAttribute('display', 'block');
          pauseIcon.setAttribute('display', 'none');
        }
      }
      
      audio.ontimeupdate = function() {
        if (audio.duration && progressFill) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.setAttribute('width', Math.min(240, (percent/100) * 240));
        }
      };
      
      audio.onended = function() {
        if (currentTrackIndex === trackList.length - 1) {
          resetToFirstTrack();
        } else {
          nextTrack();
        }
      };
      
      audio.onerror = function() {
        console.warn('Audio file not found or unsupported:', audio.src);
      };
      
      function togglePlayPause() {
        if (isPlaying) {
          audio.pause();
          isPlaying = false;
        } else {
          if (!audio.src || audio.src === '') {
            setAudioSource(currentTrackIndex);
          }
          playCurrentTrack();
          isPlaying = true;
        }
        updatePlayPauseIcons();
      }
      
      function nextTrack() {
        audio.pause();
        currentTrackIndex = (currentTrackIndex + 1) % trackList.length;
        setAudioSource(currentTrackIndex);
        updateTrackInfo();
        if (progressFill) progressFill.setAttribute('width', 0);
        
        if (isPlaying) {
          playCurrentTrack();
        } else {
          updatePlayPauseIcons();
        }
      }
      
      function prevTrack() {
        audio.pause();
        currentTrackIndex = (currentTrackIndex - 1 + trackList.length) % trackList.length;
        setAudioSource(currentTrackIndex);
        updateTrackInfo();
        if (progressFill) progressFill.setAttribute('width', 0);
        
        if (isPlaying) {
          playCurrentTrack();
        } else {
          updatePlayPauseIcons();
        }
      }
      
      window.playerControls = {
        prev: prevTrack,
        next: nextTrack,
        togglePlayPause: togglePlayPause
      };
      
      setAudioSource(0);
      updateTrackInfo();
      updatePlayPauseIcons();
    })();
  </script>
</body>
</html>
