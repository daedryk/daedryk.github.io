<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>四女巫和一巫师</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a1715 0%, #2c2824 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Serif SC', '华文楷书', 'Microsoft YaHei', 'STKaiti', 'KaiTi', serif;
      padding: 2rem 1.5rem;
    }

    .scroll-container {
      max-width: 95vw;
      width: 100%;
      background: linear-gradient(135deg, #fef9e6 0%, #fcf3dc 100%);
      box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.5), inset 0 0 0 2px #f3e2b0, inset 0 0 0 6px #e9d6a0;
      border-radius: 4px 48px 4px 48px;
      padding: 2rem 1rem 2rem 1rem;
      transition: all 0.2s;
      position: relative;
      border: 1px solid #dbb87c;
    }

    .scroll-container::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      pointer-events: none;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 4px 42px 4px 42px;
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 2.8rem;
      line-height: 4rem;
      letter-spacing: 0.1em;
      text-align: justify;
      word-break: keep-all;
      white-space: normal;
      width: 100%;
      height: auto;
      overflow: visible;
      background: linear-gradient(135deg, #2c2b26 0%, #3a3730 100%);
      background-clip: text;
      -webkit-background-clip: text;
      color: #d4af37;
      text-shadow: 0 1px 2px rgba(0,0,0,0.1), 0 0 4px rgba(212, 175, 55, 0.3);
    }

    .passage {
      background: rgba(30, 27, 22, 0.08);
      border-radius: 24px 6px 24px 6px;
      padding: 1.6rem 1rem 1.6rem 1rem;
      margin: 0.6rem 0;
      width: 100%;
      display: block;
      border-left: 2px solid rgba(212, 175, 55, 0.5);
      border-right: 2px solid rgba(192, 192, 192, 0.4);
      backdrop-filter: blur(1px);
    }

    .vertical-text::first-letter {
      font-weight: 900;
      color: #e5c665;
      text-shadow: 0 0 6px #ffd966, 0 0 1px #b8860b;
      font-size: 1.15em;
    }

    @media (min-width: 1200px) {
      .vertical-text {
        font-size: 3rem;
        line-height: 4.4rem;
      }
      .scroll-container {
        max-width: 1200px;
        padding: 2rem 1.5rem;
      }
    }

    @media (max-width: 900px) {
      .vertical-text {
        font-size: 2.2rem;
        line-height: 3.2rem;
      }
      .scroll-container {
        padding: 1.5rem 0.8rem;
      }
      .passage {
        padding: 1rem 0.7rem;
      }
    }

    @media (max-width: 600px) {
      .vertical-text {
        font-size: 1.6rem;
        line-height: 2.4rem;
      }
      .scroll-container {
        max-width: 98vw;
        padding: 1rem 0.5rem;
      }
      .passage {
        padding: 0.8rem 0.5rem;
      }
    }

    .scroll-container {
      position: relative;
    }
    .scroll-container::after {
      content: "";
      position: absolute;
      bottom: -8px;
      right: 20px;
      width: 60px;
      height: 24px;
      background: radial-gradient(ellipse at center, #d4af37 10%, #a67c2e 70%);
      border-radius: 50%;
      opacity: 0.4;
      pointer-events: none;
      filter: blur(1px);
    }
    .scroll-container::before {
      content: "";
      position: absolute;
      top: -6px;
      left: 20px;
      width: 60px;
      height: 24px;
      background: radial-gradient(ellipse at center, #e0c374 15%, #b8860b 75%);
      border-radius: 50%;
      opacity: 0.45;
      pointer-events: none;
    }

    .vertical-text {
      display: block;
      max-height: none;
      column-gap: 1.2rem;
      text-indent: 0em;
      overflow-y: visible;
      overflow-x: visible;
    }
    .passage {
      margin-bottom: 0.8rem;
      break-inside: avoid;
      word-break: break-word;
      box-shadow: inset 0 1px 3px rgba(255,215,0,0.1), 0 1px 2px rgba(0,0,0,0.02);
    }

    ::-webkit-scrollbar {
      width: 10px;
      background: #2a2724;
    }
    ::-webkit-scrollbar-track {
      background: #24201c;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #d4af37, #b49450);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #e5c665, #c9a03d);
    }

    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
<div class="scroll-container">
  <div id="verticalContent" class="vertical-text"></div>
</div>

<script>
  const rawStory = [
    "四女巫和一巫师",
    "从前，在中国古代，有四位强大的女巫生活在神秘的森林深处。每位女巫都拥有由大自然之灵赋予的独特能力。",
    "第一位是梅灵，风之女巫，她的呼吸可以唤起狂风暴雨，也能轻轻吹起和风。第二位是灵灵，火之女巫，她可以用手指点燃火焰，并使其顺从自己的命令。",
    "然后是华丽，土之女巫，她可以使大地震颤，也能在触摸间让生命蓬勃茂盛。最后是纯丽，水之女巫，她的眼泪可以治愈病痛，她的笑声可以淹没整个村庄。",
    "有一天，一位名叫魏的谦卑巫师踏上了寻找一位失踪的公主的任务。传说中，这位公主美丽善良，她的消失使王国陷入绝望。",
    "魏怀着责任和荣誉感，前往寻找四位女巫，知道她们的力量可以帮助他。怀着决心，他踏入了女巫所在的神奇森林深处。",
    "在与女巫相遇后，魏谦卑地请求她们的帮助。被他的诚意和决心所感动，女巫们同意帮助他。梅灵利用她的风扫荡整个土地，搜索每一个角落，希望找到失踪的公主的任何线索。",
    "灵灵召唤火焰照亮王国最黑暗的角落，希望发现任何可能导致公主失踪的线索。华丽借助大地揭示其秘密，利用她的力量感知由公主失踪引起的土地扰动。而纯丽，以她无尽的善心，利用水来净化和净化，希望为他们的搜寻带来清晰。",
    "五位同伴共同踏上了充满危险和不确定性的旅程。经过危险的森林和险恶的山脉，他们坚持不懈，彼此之间的联系日渐加强。",
    "最终，在经过数日不懈的搜寻后，他们发现了公主，她被一位邪恶的巫师困在了一座塔中。他们凭借自己的力量和魔法，击败了巫师，解救了公主，将她安全地送回了王国。",
    "公主对他们的勇敢和善良心怀感激，并承诺永远的友谊。于是，四位女巫和巫师返回了家园，他们的心灵充满了喜悦，精神也因为他们的崇高使命而得到了提升。"
  ];

  function removeAllPunctuation(text) {
    return text.replace(/[\p{P}\p{S}]/gu, '').replace(/[·～—…]/g, '')
                .replace(/[、。，！？；：“”‘’《》【】（）]/g, '')
                .replace(/[\.\,\!\?\:\;\"\'\(\)\[\]\{\}\<\>\*\&\^\%\$\#\@\~\`\\\/\|]/g, '');
  }

  function buildVerticalStory() {
    const container = document.getElementById('verticalContent');
    if (!container) return;
    container.innerHTML = '';

    const cleanedParagraphs = rawStory.map(para => removeAllPunctuation(para).trim());
    
    for (let i = 0; i < cleanedParagraphs.length; i++) {
      const paragraphText = cleanedParagraphs[i];
      if (paragraphText === "") continue;
      
      const passageDiv = document.createElement('div');
      passageDiv.className = 'passage';
      passageDiv.innerText = paragraphText;
      container.appendChild(passageDiv);
    }
  }
  
  document.title = "四女巫和一巫师";
  buildVerticalStory();
</script>
</body>
</html>
