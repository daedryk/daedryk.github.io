<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>四女巫和一巫师</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #12100e 0%, #2a2520 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Serif SC', '华文楷书', 'Microsoft YaHei', 'STKaiti', 'KaiTi', serif;
      padding: 2rem;
    }

    .scroll-container {
      max-width: 1000px;
      width: 100%;
      height: 85vh;
      background: linear-gradient(135deg, #fdf8ed 0%, #faf0dc 100%);
      box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 2px #f3e2b0, inset 0 0 0 6px #e9d6a0;
      border-radius: 12px 56px 12px 56px;
      padding: 1.8rem 1.2rem;
      position: relative;
      border: 1px solid #e2c288;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .scroll-container::-webkit-scrollbar {
      width: 8px;
    }
    .scroll-container::-webkit-scrollbar-track {
      background: #2c2824;
      border-radius: 10px;
      margin: 20px 0;
    }
    .scroll-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #d4af37, #9e7b3a);
      border-radius: 10px;
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 1.8rem;
      line-height: 2.6rem;
      letter-spacing: 0.08em;
      color: #c7a84b;
      text-shadow: 0 1px 1px rgba(0,0,0,0.05), 0 0 2px rgba(212, 175, 55, 0.5);
      width: 100%;
      display: block;
    }

    .passage {
      background: rgba(160, 140, 100, 0.08);
      border-radius: 20px 6px 20px 6px;
      padding: 1rem 0.9rem;
      margin: 0.6rem 0;
      border-left: 2px solid rgba(212, 175, 55, 0.6);
      border-right: 1px solid rgba(192, 192, 192, 0.3);
      transition: all 0.2s;
    }

    .passage:first-child {
      margin-top: 0;
    }

    .passage:last-child {
      margin-bottom: 0;
    }

    .vertical-text::first-letter {
      font-weight: 900;
      color: #f5d470;
      text-shadow: 0 0 4px #ffdf8c;
      font-size: 1.2em;
    }

    .scroll-container::before {
      content: "";
      position: sticky;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, #f5e2b0, #d4af37, transparent);
      margin-bottom: 10px;
      display: block;
    }

    .scroll-container::after {
      content: "";
      position: sticky;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, #f5e2b0, #d4af37, transparent);
      margin-top: 10px;
      display: block;
    }

    @media (max-width: 760px) {
      .vertical-text {
        font-size: 1.3rem;
        line-height: 2rem;
      }
      .scroll-container {
        padding: 1rem 0.8rem;
        height: 80vh;
      }
      .passage {
        padding: 0.6rem 0.6rem;
      }
    }

    @media (max-width: 560px) {
      .vertical-text {
        font-size: 1.1rem;
        line-height: 1.7rem;
      }
    }

    @media (min-width: 1200px) {
      .vertical-text {
        font-size: 2.2rem;
        line-height: 3rem;
      }
      .scroll-container {
        max-width: 1100px;
      }
    }

    .ornament-gold {
      background: radial-gradient(circle at 30% 20%, rgba(212,175,55,0.2), transparent 70%);
    }
  </style>
</head>
<body>
<div class="scroll-container">
  <div id="verticalContent" class="vertical-text"></div>
</div>

<script>
  const rawStory = [
    "四女巫和一巫师",
    "从前，在中国古代，有四位强大的女巫生活在神秘的森林深处。每位女巫都拥有由大自然之灵赋予的独特能力。",
    "第一位是梅灵，风之女巫，她的呼吸可以唤起狂风暴雨，也能轻轻吹起和风。第二位是灵灵，火之女巫，她可以用手指点燃火焰，并使其顺从自己的命令。",
    "然后是华丽，土之女巫，她可以使大地震颤，也能在触摸间让生命蓬勃茂盛。最后是纯丽，水之女巫，她的眼泪可以治愈病痛，她的笑声可以淹没整个村庄。",
    "有一天，一位名叫魏的谦卑巫师踏上了寻找一位失踪的公主的任务。传说中，这位公主美丽善良，她的消失使王国陷入绝望。",
    "魏怀着责任和荣誉感，前往寻找四位女巫，知道她们的力量可以帮助他。怀着决心，他踏入了女巫所在的神奇森林深处。",
    "在与女巫相遇后，魏谦卑地请求她们的帮助。被他的诚意和决心所感动，女巫们同意帮助他。梅灵利用她的风扫荡整个土地，搜索每一个角落，希望找到失踪的公主的任何线索。",
    "灵灵召唤火焰照亮王国最黑暗的角落，希望发现任何可能导致公主失踪的线索。华丽借助大地揭示其秘密，利用她的力量感知由公主失踪引起的土地扰动。而纯丽，以她无尽的善心，利用水来净化和净化，希望为他们的搜寻带来清晰。",
    "五位同伴共同踏上了充满危险和不确定性的旅程。经过危险的森林和险恶的山脉，他们坚持不懈，彼此之间的联系日渐加强。",
    "最终，在经过数日不懈的搜寻后，他们发现了公主，她被一位邪恶的巫师困在了一座塔中。他们凭借自己的力量和魔法，击败了巫师，解救了公主，将她安全地送回了王国。",
    "公主对他们的勇敢和善良心怀感激，并承诺永远的友谊。于是，四位女巫和巫师返回了家园，他们的心灵充满了喜悦，精神也因为他们的崇高使命而得到了提升。"
  ];

  function removeAllPunctuation(text) {
    return text.replace(/[\p{P}\p{S}]/gu, '')
                .replace(/[·～—…]/g, '')
                .replace(/[、。，！？；：“”‘’《》【】（）]/g, '')
                .replace(/[\.\,\!\?\:\;\"\'\(\)\[\]\{\}\<\>\*\&\^\%\$\#\@\~\`\\\/\|]/g, '');
  }

  function buildVerticalStory() {
    const container = document.getElementById('verticalContent');
    if (!container) return;
    container.innerHTML = '';

    const cleanedParagraphs = rawStory.map(para => removeAllPunctuation(para).trim());
    
    for (let i = 0; i < cleanedParagraphs.length; i++) {
      const paragraphText = cleanedParagraphs[i];
      if (paragraphText === "") continue;
      
      const passageDiv = document.createElement('div');
      passageDiv.className = 'passage';
      passageDiv.innerText = paragraphText;
      container.appendChild(passageDiv);
    }
  }
  
  document.title = "四女巫和一巫师";
  buildVerticalStory();
</script>
</body>
</html>
