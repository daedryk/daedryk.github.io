<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>四女巫和一巫师</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0a0908 0%, #1a1612 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Noto Serif SC', '华文楷书', 'Microsoft YaHei', 'STKaiti', 'KaiTi', serif;
      padding: 2rem 1.5rem;
    }

    .scroll-container {
      max-width: 1400px;
      width: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(235, 220, 175, 0.2), rgba(200, 180, 120, 0.08)),
                  linear-gradient(135deg, #fef8e8 0%, #faf0dc 40%, #f5e9d0 100%);
      background-blend-mode: overlay;
      box-shadow: 0 30px 45px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 2px #f3e2b0, inset 0 0 0 6px #e9d6a0;
      border-radius: 16px 64px 16px 64px;
      padding: 3rem 2rem;
      position: relative;
      border: 1px solid #e2c288;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 95vh;
      max-height: none;
    }

    .scroll-container::-webkit-scrollbar {
      width: 10px;
    }
    .scroll-container::-webkit-scrollbar-track {
      background: #2c2824;
      border-radius: 10px;
      margin: 20px 0;
    }
    .scroll-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #d4af37, #9e7b3a);
      border-radius: 10px;
    }
    .scroll-container::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #e5c665, #b8860b);
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 3.2rem;
      line-height: 4.6rem;
      letter-spacing: 0.12em;
      color: #c7a44a;
      text-shadow: 0 2px 3px rgba(0,0,0,0.1), 0 0 8px rgba(212, 175, 55, 0.5);
      width: 100%;
      display: block;
    }

    .passage {
      background: rgba(200, 180, 130, 0.08);
      border-radius: 28px 10px 28px 10px;
      padding: 1.6rem 1.2rem;
      margin: 0.4rem 0;
      border-left: 3px solid rgba(212, 175, 55, 0.7);
      border-right: 1px solid rgba(192, 192, 192, 0.3);
      backdrop-filter: blur(1px);
    }

    .vertical-text::first-letter {
      font-weight: 900;
      color: #f5d470;
      text-shadow: 0 0 8px #ffdf8c, 0 0 2px #c9a03d;
      font-size: 1.2em;
    }

    .ornament-divider {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 1rem 0 0.8rem 0;
      padding: 0.3rem 0;
    }

    .ornament-svg {
      filter: drop-shadow(0 0 2px rgba(212, 175, 55, 0.6));
      transition: all 0.2s ease;
    }

    .ornament-svg:hover {
      filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.9));
      transform: scale(1.03);
    }

    @media (max-width: 900px) {
      .vertical-text {
        font-size: 2.2rem;
        line-height: 3.2rem;
      }
      .scroll-container {
        padding: 2rem 1.2rem;
      }
      .passage {
        padding: 1rem 0.8rem;
      }
    }

    @media (max-width: 600px) {
      .vertical-text {
        font-size: 1.5rem;
        line-height: 2.2rem;
        letter-spacing: 0.06em;
      }
      .scroll-container {
        padding: 1.5rem 0.8rem;
      }
      .passage {
        padding: 0.7rem 0.6rem;
        margin: 0.3rem 0;
      }
      .ornament-divider {
        margin: 0.6rem 0 0.5rem 0;
      }
    }

    @media (min-width: 1400px) {
      .vertical-text {
        font-size: 3.8rem;
        line-height: 5.2rem;
      }
      .scroll-container {
        padding: 3.5rem 2.5rem;
      }
      .passage {
        padding: 1.8rem 1.5rem;
      }
    }

    .scroll-container::before {
      content: "";
      position: sticky;
      top: -10px;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #d4af37, #f5e2b0, #e8d28a, #d4af37, transparent);
      margin-bottom: 20px;
      display: block;
      border-radius: 3px;
      box-shadow: 0 0 6px rgba(212, 175, 55, 0.8);
    }

    .scroll-container::after {
      content: "";
      position: sticky;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #d4af37, #f5e2b0, #e8d28a, #d4af37, transparent);
      margin-top: 20px;
      display: block;
      border-radius: 3px;
      box-shadow: 0 0 6px rgba(212, 175, 55, 0.8);
    }

    @keyframes softGlow {
      0% { text-shadow: 0 2px 3px rgba(0,0,0,0.1), 0 0 4px rgba(212,175,55,0.4); }
      100% { text-shadow: 0 2px 3px rgba(0,0,0,0.1), 0 0 12px rgba(212,175,55,0.7); }
    }

    .vertical-text {
      animation: softGlow 3s infinite alternate;
    }
  </style>
</head>
<body>
<div class="scroll-container">
  <div id="verticalContent" class="vertical-text"></div>
</div>

<script>
  const rawStory = [
    "四女巫和一巫师",
    "从前，在中国古代，有四位强大的女巫生活在神秘的森林深处。每位女巫都拥有由大自然之灵赋予的独特能力。",
    "第一位是梅灵，风之女巫，她的呼吸可以唤起狂风暴雨，也能轻轻吹起和风。第二位是灵灵，火之女巫，她可以用手指点燃火焰，并使其顺从自己的命令。",
    "然后是华丽，土之女巫，她可以使大地震颤，也能在触摸间让生命蓬勃茂盛。最后是纯丽，水之女巫，她的眼泪可以治愈病痛，她的笑声可以淹没整个村庄。",
    "有一天，一位名叫魏的谦卑巫师踏上了寻找一位失踪的公主的任务。传说中，这位公主美丽善良，她的消失使王国陷入绝望。",
    "魏怀着责任和荣誉感，前往寻找四位女巫，知道她们的力量可以帮助他。怀着决心，他踏入了女巫所在的神奇森林深处。",
    "在与女巫相遇后，魏谦卑地请求她们的帮助。被他的诚意和决心所感动，女巫们同意帮助他。梅灵利用她的风扫荡整个土地，搜索每一个角落，希望找到失踪的公主的任何线索。",
    "灵灵召唤火焰照亮王国最黑暗的角落，希望发现任何可能导致公主失踪的线索。华丽借助大地揭示其秘密，利用她的力量感知由公主失踪引起的土地扰动。而纯丽，以她无尽的善心，利用水来净化和净化，希望为他们的搜寻带来清晰。",
    "五位同伴共同踏上了充满危险和不确定性的旅程。经过危险的森林和险恶的山脉，他们坚持不懈，彼此之间的联系日渐加强。",
    "最终，在经过数日不懈的搜寻后，他们发现了公主，她被一位邪恶的巫师困在了一座塔中。他们凭借自己的力量和魔法，击败了巫师，解救了公主，将她安全地送回了王国。",
    "公主对他们的勇敢和善良心怀感激，并承诺永远的友谊。于是，四位女巫和巫师返回了家园，他们的心灵充满了喜悦，精神也因为他们的崇高使命而得到了提升。"
  ];

  function removeAllPunctuation(text) {
    return text.replace(/[\p{P}\p{S}]/gu, '')
                .replace(/[·～—…]/g, '')
                .replace(/[、。，！？；：“”‘’《》【】（）]/g, '')
                .replace(/[\.\,\!\?\:\;\"\'\(\)\[\]\{\}\<\>\*\&\^\%\$\#\@\~\`\\\/\|]/g, '');
  }

  function createOrnamentSvg(variant) {
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("class", "ornament-svg");
    svg.setAttribute("width", "100");
    svg.setAttribute("height", "24");
    svg.setAttribute("viewBox", "0 0 100 24");
    svg.setAttribute("fill", "none");
    
    if (variant % 2 === 0) {
      const line1 = document.createElementNS(svgNS, "path");
      line1.setAttribute("d", "M8 12 L20 6 L32 12 L20 18 L8 12Z");
      line1.setAttribute("fill", "#D4AF37");
      line1.setAttribute("stroke", "#B8860B");
      line1.setAttribute("stroke-width", "0.6");
      line1.setAttribute("opacity", "0.85");
      
      const line2 = document.createElementNS(svgNS, "path");
      line2.setAttribute("d", "M40 12 L52 6 L64 12 L52 18 L40 12Z");
      line2.setAttribute("fill", "#D4AF37");
      line2.setAttribute("stroke", "#B8860B");
      line2.setAttribute("stroke-width", "0.6");
      line2.setAttribute("opacity", "0.85");
      
      const circle = document.createElementNS(svgNS, "circle");
      circle.setAttribute("cx", "82");
      circle.setAttribute("cy", "12");
      circle.setAttribute("r", "5");
      circle.setAttribute("fill", "#E8C87A");
      circle.setAttribute("stroke", "#B8860B");
      circle.setAttribute("stroke-width", "0.7");
      
      const innerCircle = document.createElementNS(svgNS, "circle");
      innerCircle.setAttribute("cx", "82");
      innerCircle.setAttribute("cy", "12");
      innerCircle.setAttribute("r", "2");
      innerCircle.setAttribute("fill", "#C9A03D");
      
      svg.appendChild(line1);
      svg.appendChild(line2);
      svg.appendChild(circle);
      svg.appendChild(innerCircle);
    } else {
      const diamond = document.createElementNS(svgNS, "polygon");
      diamond.setAttribute("points", "18,4 26,12 18,20 10,12");
      diamond.setAttribute("fill", "#C9A44A");
      diamond.setAttribute("stroke", "#A67C2E");
      diamond.setAttribute("stroke-width", "0.6");
      
      const diamond2 = document.createElementNS(svgNS, "polygon");
      diamond2.setAttribute("points", "50,6 56,12 50,18 44,12");
      diamond2.setAttribute("fill", "#D8B45C");
      diamond2.setAttribute("stroke", "#9E7535");
      diamond2.setAttribute("stroke-width", "0.6");
      
      const curve = document.createElementNS(svgNS, "path");
      curve.setAttribute("d", "M74 12 C78 8, 86 8, 90 12 C86 16, 78 16, 74 12Z");
      curve.setAttribute("fill", "#E8C060");
      curve.setAttribute("stroke", "#B8860B");
      curve.setAttribute("stroke-width", "0.5");
      
      const dot = document.createElementNS(svgNS, "circle");
      dot.setAttribute("cx", "82");
      dot.setAttribute("cy", "12");
      dot.setAttribute("r", "2.5");
      dot.setAttribute("fill", "#F0D878");
      
      svg.appendChild(diamond);
      svg.appendChild(diamond2);
      svg.appendChild(curve);
      svg.appendChild(dot);
    }
    
    return svg;
  }

  function buildVerticalStory() {
    const container = document.getElementById('verticalContent');
    if (!container) return;
    container.innerHTML = '';

    const cleanedParagraphs = rawStory.map(para => removeAllPunctuation(para).trim());
    
    for (let i = 0; i < cleanedParagraphs.length; i++) {
      const paragraphText = cleanedParagraphs[i];
      if (paragraphText === "") continue;
      
      const passageDiv = document.createElement('div');
      passageDiv.className = 'passage';
      passageDiv.innerText = paragraphText;
      container.appendChild(passageDiv);
      
      if (i !== cleanedParagraphs.length - 1) {
        const ornamentWrapper = document.createElement('div');
        ornamentWrapper.className = 'ornament-divider';
        const svgOrnament = createOrnamentSvg(i);
        ornamentWrapper.appendChild(svgOrnament);
        container.appendChild(ornamentWrapper);
      }
    }
  }
  
  document.title = "四女巫和一巫师";
  buildVerticalStory();
</script>
</body>
</html>
