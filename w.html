<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>四女巫与巫师 · 赤金史诗</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #8b0000 0%, #b22222 35%, #ffd700 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'PingFang SC', 'SimHei', 'STHeiti', serif;
            padding: 2rem 1.5rem;
        }

        .scroll-container {
            max-width: 1100px;
            width: 100%;
            background: #c72a0f;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 215, 0, 0.15) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(255, 215, 0, 0.12) 1.8%, transparent 2%);
            background-size: 45px 45px, 38px 38px;
            border-radius: 56px 28px 64px 28px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.4), inset 0 1px 3px rgba(255, 235, 120, 0.8);
            padding: 2rem 2rem 2.5rem 2rem;
        }

        .text-pavilion {
            background: #ffefc0;
            background: linear-gradient(135deg, #ffefc0 0%, #fff3cf 100%);
            border-radius: 40px 18px 48px 18px;
            padding: 2rem 2rem 2rem 2.5rem;
            box-shadow: inset 0 0 0 2px #ffcd7e, 0 12px 18px rgba(0, 0, 0, 0.3);
            border-left: 8px solid #e6b422;
            border-bottom: 6px solid #e6b422;
        }

        .vertical-epic {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            font-weight: 500;
            line-height: 1.65;
            letter-spacing: 0.03em;
        }

        .first-line {
            font-size: 2rem;
            font-weight: 800;
            color: #b12a0a;
            text-shadow: 2px 2px 0 #ffcd7e;
            margin-bottom: 0.75rem;
            padding-bottom: 0.25rem;
            border-bottom: 3px solid #d4af37;
            display: inline-block;
            width: auto;
            letter-spacing: 0.1em;
        }
        
        .rest-segments {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin-top: 0.25rem;
        }
        
        .segment {
            font-size: 1.1rem;
            color: #2c1810;
            background: rgba(255, 235, 160, 0.6);
            padding: 0.3rem 0.8rem 0.3rem 1rem;
            border-left: 6px solid #e6b422;
            border-radius: 0 24px 12px 0;
            transition: all 0.2s;
            margin-left: 2rem;
            line-height: 1.55;
            backdrop-filter: blur(1px);
            font-weight: 500;
        }
        
        .segment:hover {
            background: #fff2cf;
            border-left-color: #ed4b1a;
            transform: translateX(4px);
            box-shadow: -2px 2px 6px rgba(160, 40, 0, 0.2);
        }
        
        @media (max-width: 640px) {
            .scroll-container {
                padding: 1rem;
            }
            .text-pavilion {
                padding: 1rem 1rem 1rem 1.2rem;
            }
            .segment {
                margin-left: 0.8rem;
                padding: 0.4rem 0.5rem 0.4rem 0.8rem;
                font-size: 0.95rem;
            }
            .first-line {
                font-size: 1.8rem;
            }
        }
        
        .chop-seal {
            text-align: right;
            margin-top: 2rem;
            font-family: '华文楷书', 'KaiTi', cursive;
            color: #c53a0a;
            font-size: 0.85rem;
            opacity: 0.7;
            border-top: 1px solid #f0b27a;
            padding-top: 1rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }
        
        .chop {
            background: #c53a0a20;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #9b2e0e;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .red-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #e02215;
            border-radius: 50%;
            box-shadow: 0 0 0 2px #ffcd7e;
            margin-right: 6px;
        }
    </style>
</head>
<body>
<div class="scroll-container">
    <div class="text-pavilion">
        <div class="vertical-epic">
            <div class="first-line">⚡ 四女巫和一巫师 ⚡</div>
            
            <div class="rest-segments" id="segmentsContainer"></div>
        </div>
        <div class="chop-seal">
            <span class="chop"><span class="red-dot"></span> 赤心永燃</span>
            <span class="chop">⚜️ 风火土水 ⚜️</span>
        </div>
    </div>
</div>

<script>
    const rawText = `四女巫和一巫师

从前，在中国古代，有四位强大的女巫生活在神秘的森林深处。每位女巫都拥有由大自然之灵赋予的独特能力。

第一位是梅灵，风之女巫，她的呼吸可以唤起狂风暴雨，也能轻轻吹起和风。第二位是灵灵，火之女巫，她可以用手指点燃火焰，并使其顺从自己的命令。

然后是华丽，土之女巫，她可以使大地震颤，也能在触摸间让生命蓬勃茂盛。最后是纯丽，水之女巫，她的眼泪可以治愈病痛，她的笑声可以淹没整个村庄。

有一天，一位名叫魏的谦卑巫师踏上了寻找一位失踪的公主的任务。传说中，这位公主美丽善良，她的消失使王国陷入绝望。

魏怀着责任和荣誉感，前往寻找四位女巫，知道她们的力量可以帮助他。怀着决心，他踏入了女巫所在的神奇森林深处。

在与女巫相遇后，魏谦卑地请求她们的帮助。被他的诚意和决心所感动，女巫们同意帮助他。梅灵利用她的风扫荡整个土地，搜索每一个角落，希望找到失踪的公主的任何线索。

灵灵召唤火焰照亮王国最黑暗的角落，希望发现任何可能导致公主失踪的线索。华丽借助大地揭示其秘密，利用她的力量感知由公主失踪引起的土地扰动。

而纯丽，以她无尽的善心，利用水来净化和净化，希望为他们的搜寻带来清晰。

五位同伴共同踏上了充满危险和不确定性的旅程。经过危险的森林和险恶的山脉，他们坚持不懈，彼此之间的联系日渐加强。

最终，在经过数日不懈的搜寻后，他们发现了公主，她被一位邪恶的巫师困在了一座塔中。他们凭借自己的力量和魔法，击败了巫师，解救了公主，将她安全地送回了王国。

公主对他们的勇敢和善良心怀感激，并承诺永远的友谊。于是，四位女巫和巫师返回了家园，他们的心灵充满了喜悦，精神也因为他们的崇高使命而得到了提升。`;

    function removeAllPunctuation(str) {
        const punctuationRegex = /[\u3000-\u303F\uFF00-\uFFEF\u2000-\u206F\u3002\uff0c\uff1b\uff1f\uff01\uff1a\uff1b\u3001\uff0c\u3002\uffe5\uff08\uff09\u3010\u3011\u300a\u300b\u300e\u300f\u2018\u2019\u201c\u201d\u2026\u2014\uff5e\uff1f\uff01\uff1a\u00B7\u30FB\u25CF~`!@#$%^&*()_+=\[\]{};':"\\|,.<>\/?·！￥…（）—【】‘；：”“’。，？、]/g;
        let noPunct = str.replace(punctuationRegex, '');
        noPunct = noPunct.replace(/[.,!?;:()\[\]{}<>"'`~@#$%^&*_=+\\|/]/g, '');
        return noPunct;
    }
    
    let lines = rawText.split(/\r?\n/);
    let firstLineContent = "";
    let remainingLines = [];
    let firstFound = false;
    for (let i = 0; i < lines.length; i++) {
        let trimmed = lines[i].trim();
        if (!firstFound && trimmed === "四女巫和一巫师") {
            firstLineContent = trimmed;
            firstFound = true;
            continue;
        }
        remainingLines.push(lines[i]);
    }
    
    if (!firstFound && rawText.indexOf("四女巫和一巫师") === 0) {
        firstLineContent = "四女巫和一巫师";
        let restRaw = rawText.slice(firstLineContent.length);
        remainingLines = restRaw.split(/\r?\n/);
    }
    
    let restText = remainingLines.join("\n");
    let rawSegments = restText.split(/\n\s*\n/);
    rawSegments = rawSegments.filter(seg => seg.trim().length > 0);
    
    const cleanedSegments = rawSegments.map(seg => {
        let withoutPunc = removeAllPunctuation(seg);
        withoutPunc = withoutPunc.replace(/\s+/g, ' ').trim();
        return withoutPunc;
    });
    
    const container = document.getElementById('segmentsContainer');
    if (container) {
        container.innerHTML = '';
        cleanedSegments.forEach((segmentText, idx) => {
            if (segmentText.length === 0) return;
            const div = document.createElement('div');
            div.className = 'segment';
            div.innerHTML = `<span style="color:#D4351C; font-weight:bold; margin-right:8px;">✦</span>${segmentText}`;
            container.appendChild(div);
        });
        
        if (cleanedSegments.length === 0) {
            let fallbackText = removeAllPunctuation(restText);
            let fallbackSegments = fallbackText.split(/\n\s*\n/);
            fallbackSegments.forEach(seg => {
                if(seg.trim()) {
                    const div = document.createElement('div');
                    div.className = 'segment';
                    div.innerText = seg.replace(/\s+/g, ' ').trim();
                    container.appendChild(div);
                }
            });
        }
    }
</script>
</body>
</html>
