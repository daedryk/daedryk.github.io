<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>四女巫和一巫师</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fbf5e8;
      background-image: radial-gradient(circle at 10% 20%, rgba(210, 180, 140, 0.08) 2%, transparent 2.5%),
                        radial-gradient(circle at 85% 70%, rgba(160, 120, 80, 0.05) 1.8%, transparent 2%);
      background-size: 48px 48px, 32px 32px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Serif SC', '华文楷书', 'Microsoft YaHei', 'STKaiti', 'KaiTi', serif;
      padding: 2rem 1.5rem;
    }

    .scroll-container {
      max-width: 1100px;
      width: 100%;
      background: #fffef7;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), inset 0 0 0 1px #f0e2c5, inset 0 0 0 6px #f9efdf;
      border-radius: 4px 32px 4px 32px;
      padding: 2rem 1rem 2rem 1rem;
      transition: all 0.2s;
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 2.8rem;
      line-height: 4rem;
      letter-spacing: 0.08em;
      color: #2e241f;
      text-align: justify;
      word-break: keep-all;
      white-space: normal;
    }

    .passage {
      background: rgba(250, 245, 235, 0.5);
      border-radius: 28px 8px 28px 8px;
      padding: 1.6rem 1rem 1.6rem 1rem;
      margin: 0.6rem 0;
    }

    @media (max-width: 768px) {
      .vertical-text {
        font-size: 2rem;
        line-height: 3rem;
      }
      .scroll-container {
        padding: 1.5rem 0.8rem;
      }
      .passage {
        padding: 1rem 0.7rem;
      }
    }

    @media (max-width: 480px) {
      .vertical-text {
        font-size: 1.6rem;
        line-height: 2.4rem;
      }
    }

    .scroll-container {
      position: relative;
    }
    .scroll-container::before,
    .scroll-container::after {
      content: "";
      position: absolute;
      width: 40px;
      height: 20px;
      background: radial-gradient(ellipse at center, #d9b48b 20%, #b87c4f 80%);
      border-radius: 50%;
      opacity: 0.3;
      pointer-events: none;
    }
    .scroll-container::before {
      top: -8px;
      left: 20px;
    }
    .scroll-container::after {
      bottom: -8px;
      right: 20px;
    }

    .vertical-text::first-letter {
      font-weight: 800;
      color: #8b3c1c;
      font-size: 1.1em;
    }

    .vertical-text {
      display: block;
      max-height: none;
      column-gap: 1.2rem;
      text-indent: 0em;
    }
    .passage {
      margin-bottom: 0.8rem;
      break-inside: avoid;
    }
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>
<body>
<div class="scroll-container">
  <div id="verticalContent" class="vertical-text"></div>
</div>

<script>
  const rawStory = [
    "四女巫和一巫师",
    "从前，在中国古代，有四位强大的女巫生活在神秘的森林深处。每位女巫都拥有由大自然之灵赋予的独特能力。",
    "第一位是梅灵，风之女巫，她的呼吸可以唤起狂风暴雨，也能轻轻吹起和风。第二位是灵灵，火之女巫，她可以用手指点燃火焰，并使其顺从自己的命令。",
    "然后是华丽，土之女巫，她可以使大地震颤，也能在触摸间让生命蓬勃茂盛。最后是纯丽，水之女巫，她的眼泪可以治愈病痛，她的笑声可以淹没整个村庄。",
    "有一天，一位名叫魏的谦卑巫师踏上了寻找一位失踪的公主的任务。传说中，这位公主美丽善良，她的消失使王国陷入绝望。",
    "魏怀着责任和荣誉感，前往寻找四位女巫，知道她们的力量可以帮助他。怀着决心，他踏入了女巫所在的神奇森林深处。",
    "在与女巫相遇后，魏谦卑地请求她们的帮助。被他的诚意和决心所感动，女巫们同意帮助他。梅灵利用她的风扫荡整个土地，搜索每一个角落，希望找到失踪的公主的任何线索。",
    "灵灵召唤火焰照亮王国最黑暗的角落，希望发现任何可能导致公主失踪的线索。华丽借助大地揭示其秘密，利用她的力量感知由公主失踪引起的土地扰动。而纯丽，以她无尽的善心，利用水来净化和净化，希望为他们的搜寻带来清晰。",
    "五位同伴共同踏上了充满危险和不确定性的旅程。经过危险的森林和险恶的山脉，他们坚持不懈，彼此之间的联系日渐加强。",
    "最终，在经过数日不懈的搜寻后，他们发现了公主，她被一位邪恶的巫师困在了一座塔中。他们凭借自己的力量和魔法，击败了巫师，解救了公主，将她安全地送回了王国。",
    "公主对他们的勇敢和善良心怀感激，并承诺永远的友谊。于是，四位女巫和巫师返回了家园，他们的心灵充满了喜悦，精神也因为他们的崇高使命而得到了提升。"
  ];

  function removeAllPunctuation(text) {
    return text.replace(/[\p{P}\p{S}]/gu, '').replace(/[·～—…]/g, '')
                .replace(/[、。，！？；：“”‘’《》【】（）]/g, '')
                .replace(/[\.\,\!\?\:\;\"\'\(\)\[\]\{\}\<\>\*\&\^\%\$\#\@\~\`\\\/\|]/g, '');
  }

  function buildVerticalStory() {
    const container = document.getElementById('verticalContent');
    if (!container) return;
    container.innerHTML = '';

    const cleanedParagraphs = rawStory.map(para => removeAllPunctuation(para).trim());
    
    for (let i = 0; i < cleanedParagraphs.length; i++) {
      const paragraphText = cleanedParagraphs[i];
      if (paragraphText === "") continue;
      
      const passageDiv = document.createElement('div');
      passageDiv.className = 'passage';
      passageDiv.innerText = paragraphText;
      container.appendChild(passageDiv);
    }
  }
  
  document.title = "四女巫和一巫师 · 巨幅竖卷";
  buildVerticalStory();
</script>
</body>
</html>
