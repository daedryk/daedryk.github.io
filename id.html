<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魏魔族</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(145deg, #05241c 0%, #0b3f31 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      padding: 0.75rem 0.75rem;
    }
    .id-card {
      width: 680px;
      max-width: 92vw;
      background-color: #0a2f26;
      border: 3px solid #73c7b0;
      border-radius: 32px;
      padding: 2.2rem 2rem 2rem 2rem;
      color: #d2ffe8;
      box-shadow: 0 25px 40px -10px rgba(0, 30, 20, 0.8);
    }
    .info-field {
      border: 2px solid #3f9c86;
      border-radius: 40px;
      background-color: #0d382e;
      padding: 1rem 2rem;
      margin-bottom: 1.75rem;
      word-break: break-word;
      transition: border-color 0.15s, background-color 0.15s;
    }
    .info-field:hover {
      border-color: #9de0cf;
      background-color: #12493b;
    }
    .label {
      font-size: 0.9rem;
      text-transform: uppercase;
      color: #9adac8;
      opacity: 0.9;
      margin-bottom: 0.3rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .value {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      color: #dafff2;
    }
    .value.address { font-size: 1rem; }
    .value.mail { word-break: break-all; }
    .info-field:last-of-type {
      margin-bottom: 0;
    }
    .badge {
      display: flex;
      justify-content: center;
      margin-bottom: 1.2rem;
      color: #6fcab2;
      font-weight: bold;
      font-size: 1.9rem;
      border-bottom: 1px dashed #409882;
      padding-bottom: 0.6rem;
    }
    a, a:visited {
      color: #b8f3e0;
      text-decoration: none;
      border-bottom: 1px dotted #52b69a;
      transition: color 0.2s, border-color 0.2s;
    }
    a:hover {
      color: #ffffff;
      border-bottom: 2px solid #95edd6;
    }
    .home-link {
      margin-top: 1.8rem;
      text-align: right;
      border-top: 2px dotted #3f9c86;
      padding-top: 1.2rem;
    }
    .home-link a {
      font-size: 1rem;
      font-weight: 700;
      border-bottom: 2px solid #47b294;
      padding-bottom: 2px;
    }
    .home-link a:hover {
      border-bottom: 3px solid #a1f0da;
    }
    .player-section {
      margin-top: 2rem;
      border: 2px solid #3f9c86;
      border-radius: 40px;
      background-color: #0d382e;
      padding: 1.4rem 2rem;
      transition: border-color 0.15s, background-color 0.15s;
    }
    .player-section:hover {
      border-color: #7cd9c0;
      background-color: #115543;
    }
    .player-title {
      font-size: 1rem;
      text-transform: uppercase;
      color: #abe2d2;
      margin-bottom: 1rem;
      font-weight: 700;
      border-bottom: 1px dashed #409882;
      padding-bottom: 0.4rem;
    }
    .player-controls {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .play-pause-btn {
      background: none;
      border: 2px solid #47b294;
      border-radius: 60px;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s linear;
      background-color: #288570;
      color: transparent;
      text-indent: -9999px;
      font-size: 0;
      line-height: 0;
      padding: 0;
      box-shadow: 0 0 8px #68cdb0;
    }
    .play-pause-btn:hover {
      background-color: #3eb398;
      border-color: #98edd6;
      box-shadow: 0 0 14px #8ee6cf;
    }
    .progress-container {
      flex: 1;
      display: flex;
      align-items: center;
    }
    .progress-bar {
      width: 100%;
      height: 14px;
      background-color: #143f34;
      border: 2px solid #3f9c86;
      border-radius: 20px;
      appearance: none;
      cursor: pointer;
    }
    .progress-bar::-webkit-progress-bar {
      background-color: #143f34;
      border-radius: 20px;
    }
    .progress-bar::-webkit-progress-value {
      background-color: #7ed9c2;
      border-radius: 20px;
    }
    .progress-bar::-moz-progress-bar {
      background-color: #7ed9c2;
      border-radius: 20px;
    }
    audio {
      display: none;
    }
  </style>
</head>
<body>
  <div class="id-card">
    <div class="badge">
      <a href="https://m.twitch.tv/21351147">Agent Smooth</a>
    </div>
    <div class="info-field">
      <div class="label">full name</div>
      <div class="value">Dejan Ilič</div>
    </div>
    <div class="info-field">
      <div class="label">date of birth</div>
      <div class="value">March 31st 1980</div>
    </div>
    <div class="info-field">
      <div class="label">address</div>
      <div class="value address">
        Toplarniška ulica 9<br>1000 Ljubljana, Slovenia
      </div>
    </div>
    <div class="info-field">
      <div class="label">phone</div>
      <div class="value">
        <a href="tel:+38630455165">+386 30 455 165</a>
      </div>
    </div>
    <div class="info-field">
      <div class="label">e‑mail</div>
      <div class="value mail">
        <a href="mailto:daedryk@proton.me">daedryk@proton.me</a>
      </div>
    </div>
    <div class="home-link">
      <a href="https://daedryk.github.io/">RETURN HOME</a>
    </div>
    <div class="player-section">
      <div class="player-title">mouse trap</div>
      <div class="player-controls">
        <button class="play-pause-btn" id="playPauseBtn" aria-label="play/pause"></button>
        <div class="progress-container">
          <progress class="progress-bar" id="progressBar" value="0" max="100"></progress>
        </div>
      </div>
    </div>
  </div>
  <audio id="track" src="trap.mp3" preload="metadata"></audio>
  <script>
    (function() {
      const playBtn = document.getElementById('playPauseBtn');
      const progressBar = document.getElementById('progressBar');
      const audio = document.getElementById('track');
      let animationFrame = null;
      let wasSeeking = false;
      const updateProgress = () => {
        if (!audio.duration || isNaN(audio.duration) || !audio.duration) {
          progressBar.value = 0;
          return;
        }
        const percent = (audio.currentTime / audio.duration) * 100;
        progressBar.value = Math.min(100, Math.max(0, percent));
      };
      const whilePlaying = () => {
        if (audio.ended) {
          playBtn.style.backgroundColor = '#288570';
          progressBar.value = 0;
          if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
          }
          return;
        }
        if (!audio.paused && audio.duration) {
          updateProgress();
          animationFrame = requestAnimationFrame(whilePlaying);
        } else {
          if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
          }
        }
      };
      const togglePlayback = () => {
        if (audio.paused) {
          if (audio.ended) {
            audio.currentTime = 0;
          }
          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise
              .then(() => {
                playBtn.style.backgroundColor = '#4fcbad';
                if (animationFrame) cancelAnimationFrame(animationFrame);
                animationFrame = requestAnimationFrame(whilePlaying);
              })
              .catch(() => {
                playBtn.style.backgroundColor = '#288570';
              });
          }
        } else {
          audio.pause();
          playBtn.style.backgroundColor = '#288570';
          if (animationFrame) {
            cancelAnimationFrame(animationFrame);
            animationFrame = null;
          }
        }
      };
      playBtn.addEventListener('click', togglePlayback);
      progressBar.addEventListener('mousedown', () => {
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        wasSeeking = true;
      });
      progressBar.addEventListener('input', (e) => {
        if (!audio.duration || isNaN(audio.duration)) return;
        const newTime = (progressBar.value / 100) * audio.duration;
        audio.currentTime = newTime;
      });
      progressBar.addEventListener('change', () => {
        if (!audio.duration) return;
        wasSeeking = false;
        if (!audio.paused) {
          if (animationFrame) cancelAnimationFrame(animationFrame);
          animationFrame = requestAnimationFrame(whilePlaying);
        }
      });
      document.addEventListener('mouseup', () => {
        if (wasSeeking) {
          wasSeeking = false;
          if (!audio.paused) {
            if (animationFrame) cancelAnimationFrame(animationFrame);
            animationFrame = requestAnimationFrame(whilePlaying);
          }
        }
      });
      audio.addEventListener('loadedmetadata', () => {
        progressBar.value = 0;
      });
      audio.addEventListener('ended', () => {
        playBtn.style.backgroundColor = '#288570';
        progressBar.value = 0;
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        audio.currentTime = 0;
      });
      audio.addEventListener('error', () => {});
      playBtn.style.backgroundColor = '#288570';
      progressBar.value = 0;
      window.addEventListener('beforeunload', () => {
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
      });
    })();
  </script>
</body>
</html>
