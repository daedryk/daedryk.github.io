<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヤマト</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #5a5a5a;  
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="transistorGrid" patternUnits="userSpaceOnUse" width="20" height="20"><path d="M 0 0 L 20 0 L 20 20 L 0 20 Z" fill="none" stroke="%23333333" stroke-width="0.7" stroke-opacity="0.22"/><path d="M 10 0 L 10 20 M 0 10 L 20 10" stroke="%23404040" stroke-width="0.5" stroke-opacity="0.28"/><circle cx="10" cy="10" r="1.8" fill="%232b2b2b" fill-opacity="0.3" stroke="none"/><circle cx="10" cy="10" r="1.0" fill="%237f7f7f" fill-opacity="0.25" stroke="none"/></pattern></defs><rect width="100" height="100" fill="url(%23transistorGrid)" /></svg>');
            background-repeat: repeat;
            background-size: 100px 100px;
            background-attachment: fixed;

            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            width: 100%;
            text-align: center;
            color: #000;
            text-shadow: 0 0 10px #f00, 0 0 20px #f00;
            font-size: 2rem;
            margin: 20px 0;
            padding: 12px;
            background-color: rgba(30,30,30,0.15);
            backdrop-filter: blur(1px);
            border-radius: 4px;
        }

        .message {
            max-width: 600px;
            width: 100%;
            margin: 0 auto 12px;
            padding: 12px;
            color: #000;
            text-shadow: 0 0 10px #f00, 0 0 20px #f00;
            font-size: 0.75rem;
            line-height: 1.6;
            text-align: center;
            word-wrap: break-word;
            background-color: rgba(20,20,20,0.1);
            backdrop-filter: blur(1px);
            border-radius: 12px;
        }

        a img {
            display: block;
            border-radius: 108px;
            box-shadow: 0 0 9px #000000, 0 0 27px #ff0000;
            transition: 0.2s ease;
        }

        a img:hover {
            box-shadow: 0 0 27px #f00;
        }

        .message:last-of-type {
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <h1>ヤマト</h1>
    <div class="message">
        ​やまとは大きな山に住んでいました。<br>
        毎朝、彼は山の頂上に登って、美しい日の出を見ました。<br>
       山々の間を流れる川も、彼の友達でした。<br>
       ある日、やまとは山の森で新しい友達、小さなキツネに出会いました。<br>
       キツネはやまとに山の不思議な物語を教えてくれました。<br>
       それから、やまとは毎日新しい冒険を楽しむことができました。<br>
        &#8472;
    </div>
    <a href="8472.html" title="Demo"><img height="216" width="216" src="img.gif" alt="Orb of Obsession"></a>
</body>
</html>
